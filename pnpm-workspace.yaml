# Vaipakam monorepo workspace layout.
#
# `apps/` holds runnable surfaces — each is its own deployable
# (Vite SPA, Cloudflare Worker, etc.):
#   - apps/defi    in-app surface served at defi.vaipakam.com
#                   (formerly the top-level frontend/)
#   - apps/www     marketing + docs site → www.vaipakam.com
#                   (canonical) + vaipakam.com (apex 301 → www).
#                   Folder renamed from `apps/labs` in the labs →
#                   www cutover; labs.vaipakam.com now serves a
#                   Cloudflare Bulk Redirect to the new canonical
#                   for ≥6 months so old indexed URLs hand their
#                   PageRank forward. Wallet-free.
#   - apps/agent   read/index Cloudflare Worker → agent.vaipakam.com
#   - apps/indexer chain → D1 ingester        → indexer.vaipakam.com
#   - apps/keeper  autonomous keeper Worker   → keeper.vaipakam.com
#   - apps/alpha   FROZEN ARCHIVE → alpha.vaipakam.com.
#                   Pre-Stage-3/4 monolithic frontend snapshot from
#                   main@f48c99fa, kept as a reference deploy for the
#                   refactor cutover window. Do NOT patch — see the
#                   archive header in apps/alpha/wrangler.jsonc.
#                   Scheduled for full removal a few weeks after
#                   the new surfaces stabilise. The pnpm `apps/*`
#                   glob picks it up so `pnpm install` resolves
#                   its dependencies, but workspace-wide
#                   typecheck / build commands should filter it
#                   out (`pnpm --filter '!@vaipakam/alpha' …`)
#                   because the archive carries its own pinned
#                   dependency tree that may not satisfy the
#                   newer apps' invariants.
#
# `packages/` holds shared internal libraries — no deploy of their
# own, consumed by the apps via workspace `:` protocol:
#   - packages/contracts  ABI JSONs + deployments + ChainConfig
#   - packages/ui         shared React components
#   - packages/lib        shared utilities (formatters, multicall, ...)
#
# `contracts/` (Foundry) is intentionally NOT in this workspace —
# it's a Solidity project, not a JS package. Its build tooling
# (`forge`) operates on its own root.
#
# `ops/hf-watcher` was the historical monolithic Worker; its source
# was carved into apps/{keeper,indexer,agent} in the Stage 3 split
# on 2026-05-08. The pre-split snapshot is now archived under
# `ops/alpha/hf-watcher/` (frozen, do NOT patch — see the
# DECOMMISSIONED.md tombstone in that folder). The Cloudflare
# Worker `vaipakam-hf-watcher` is still bound while the new
# Workers stabilise; operator-side decommission is scheduled a
# few weeks out.
#
# `ops/{lz-watcher,subgraph,tenderly}` are ACTIVE production
# tooling (LayerZero security monitor, drift subgraph, Tenderly
# alert presets) and stay outside the apps/* workspace because
# they deploy to platforms other than Cloudflare Workers
# (lz-watcher is a Cloudflare Worker but deliberately separate
# for trust-boundary reasons; subgraph runs on The Graph;
# Tenderly alerts deploy via the Tenderly CLI).
#
# `vaipakam-keeper-bot` is a separate sibling repo (extracted
# Phase 9.A) and stays separate — not part of this workspace.
packages:
  - 'apps/*'
  - 'packages/*'
