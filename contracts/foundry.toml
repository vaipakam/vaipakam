[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = '0.8.29'
viaIR = true
optimizer = true
optimizer_runs = 200
threads = 8

# T-068 — the vendored Chainlink `chainlink-ccip` / `chainlink-evm` trees
# carry Chainlink's OWN Foundry test files (`*.t.sol`) and test helpers.
# `forge test` test-discovery would otherwise try to compile them, and they
# fail (they expect Chainlink's own remapping context — a different
# `forge-std`, old OZ versions, etc.). Vaipakam never runs dependency
# tests, so this excludes them from compilation. Production CCIP/pool
# contracts are unaffected — only the deps' `test/` material is skipped.
skip = [
  "lib/chainlink-ccip/**/*.t.sol",
  "lib/chainlink-evm/**/*.t.sol",
  "lib/chainlink-ccip/**/test/**",
  "lib/chainlink-evm/**/test/**",
]

# Filesystem cheatcode permissions. Required by `script/lib/Deployments.sol`
# so deploy scripts can WRITE the per-chain `deployments/<chain>/addresses.json`
# artifact at the end of a broadcast, and post-deploy scripts can READ from
# the same file. Foundry's default FS sandbox blocks all `vm.readFile` /
# `vm.writeJson` calls; this allow-list narrows the grant to the
# `deployments/` subtree only — never the rest of the workspace.
fs_permissions = [
  { access = "read-write", path = "./deployments/" },
  # Phase 6 + Q2 audit-package — SlippageCensus + SlippageCensusPreDeploy
  # read per-chain config JSONs (`SlippageCensus.chains.json` +
  # `SlippageCensus.assets.json`) from this directory. Read-only — the
  # scripts never write to script/.
  { access = "read", path = "./script/" },
  # Issue #71 — test/deploy/SelectorCoverageTest reads compiled facet
  # artifacts (`out/<Facet>.sol/<Facet>.json`) to introspect each
  # facet's `methodIdentifiers`. Read-only — the build artifact tree.
  { access = "read", path = "./out/" },
]

[profile.coverage]
viaIR = true
optimizer = true
optimizer_runs = 200

# ── #185 — Fast inner-loop iteration profile ──────────────────────────────
# Skips the project's `test/` and `script/` trees so `forge build` only
# compiles `src/` + `lib/` deps. viaIR stays ON (several src/ facets —
# e.g., VaultFactoryFacet.sol:631 — structurally need it to compile,
# stack-too-deep otherwise). Optimizer stays ON (runs=200, same as
# default) for the same reason. The win comes entirely from the LOC
# reduction: src/ alone is ~half of the total Solidity, and the lib's
# tests (Chainlink) were already skipped in the default profile too.
#
# Measured: cold build under quick profile is materially faster than
# default + RSS substantially lower. Numbers recorded in the PR body
# for #185.
#
# Usage:
#   - Quick inner-loop iteration: `FOUNDRY_PROFILE=quick forge build`
#     - Skips test/ + script/ compile (intentional). Run `forge test`
#       under default profile when you need to compile / run tests.
#   - Pre-deploy / CI / regression: `forge build` (default profile,
#     unchanged) — exhaustive coverage as today.
#   - Do NOT use `FOUNDRY_PROFILE=quick` with `forge test`: tests need
#     viaIR + optimizer parity with src/ to faithfully reproduce
#     production bytecode, and the test/ skip empties test discovery.
#
# See CLAUDE.md "Executing forge" section for cross-profile guidance.
[profile.quick]
src = "src"
out = "out"
libs = ["lib"]
solc_version = '0.8.29'
viaIR = true
optimizer = true
optimizer_runs = 200
threads = 8
skip = [
  # Chainlink dependency tests (same as default; can't be inherited
  # because Foundry's profile inheritance does not deep-merge arrays).
  "lib/chainlink-ccip/**/*.t.sol",
  "lib/chainlink-evm/**/*.t.sol",
  "lib/chainlink-ccip/**/test/**",
  "lib/chainlink-evm/**/test/**",
  # #185 — skip the project's own tests + scripts in the fast profile.
  # `forge test` and `forge script` should be run under the default
  # profile so they get viaIR + optimizer parity with src/.
  "test/**",
  "script/**",
]
fs_permissions = [
  { access = "read-write", path = "./deployments/" },
  { access = "read", path = "./script/" },
  { access = "read", path = "./out/" },
]

# ── #290 — CI-fast scope profile ───────────────────────────────────────────
# Scope: deploy-sanity + positive-flow scenarios. `contracts-fast` runs
# under this profile so the per-PR-push CI lane peaks at ~3.2 GB RSS in
# ~5:22 wall-clock instead of the ~17.7 GB / 30 min full build (which
# was OOM-killing the standard-runner job that gated PR #288).
#
# IN scope (compiled):
#   - all of src/
#   - script/ (test/deploy/DeployDiamondIntegrationTest imports
#     DeployDiamond.s.sol; other deploy + Anvil scripts compile as a
#     side-effect)
#   - test/deploy/** (3 deploy-sanity tests + DiamondFacetNames helper)
#   - test/scenarios/** (8 positive-flow happy-path scenarios)
#   - test/mocks/** (required by several scripts that import ERC20Mock,
#     ERC1155RentableMock, ZeroExProxyMock, etc.)
#   - test/SetupTest.t.sol (scenarios' inherited base, transitively
#     pulled in via import even though it's also a top-level .t.sol;
#     Foundry's import-graph-driven compile keeps imported bases even
#     when they're in the skip list)
#   - test/HelperTest.sol (selector helper SetupTest uses)
#   - lib/
#
# OUT of scope (skipped — picked up by operator-local
# `forge test --no-match-path "test/invariants/*"` at end-of-step,
# and by the release-track `mainnet-gate.yml` workflow on push to
# `release/**` / `v*` tags via `predeploy-check.sh --full`. NOT
# exercised on per-PR CI; see ADR-0011 for the why):
#   - the other 94 top-level test/*.t.sol files (per-facet integration
#     + library + workflow tests) — enumerated explicitly below because
#     Foundry's globset implementation appears to traverse subdirectories
#     for `test/*.t.sol` patterns, which would incorrectly catch the
#     positive flows under test/scenarios/**
#   - test/invariants/** (24 invariant tests)
#   - test/fork/** (3 mainnet-fork tests; need RPC URLs)
#   - test/token/** (1 token-specific test)
#
# Behavioural parity: all compile settings (viaIR, optimizer, optimizer_runs,
# solc_version) are identical to `[profile.default]` so the bytecode this
# profile produces is bit-identical to what the operator runs locally.
# Only the file-skip list differs.
[profile.cifast]
src = "src"
out = "out"
libs = ["lib"]
solc_version = '0.8.29'
viaIR = true
optimizer = true
optimizer_runs = 200
threads = 8
skip = [
  # Chainlink dependency tests (mirrors default — Foundry doesn't
  # deep-merge arrays across profiles)
  "lib/chainlink-ccip/**/*.t.sol",
  "lib/chainlink-evm/**/*.t.sol",
  "lib/chainlink-ccip/**/test/**",
  "lib/chainlink-evm/**/test/**",
  # CI-fast scope: every non-positive-flow top-level test file is
  # enumerated below. Positive flows live under `test/scenarios/**`
  # (intentionally not listed here, so they stay in the build graph)
  # along with `test/deploy/**`, `test/SetupTest.t.sol`,
  # `test/HelperTest.sol`, and `test/mocks/**`.
  #
  # Why enumerated rather than a glob: Foundry's `skip` matching
  # appears to traverse subdirectories under a `test/*.t.sol` glob,
  # which would incorrectly catch `test/scenarios/**` files. Explicit
  # paths are unambiguous.
  "test/AcceptRangedOfferTest.t.sol",
  "test/AccessControlFacetTest.t.sol",
