[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = '0.8.29'
viaIR = true
optimizer = true
optimizer_runs = 200

[profile.coverage]
viaIR = true
optimizer = true
optimizer_runs = 200

[fuzz]
runs = 1000

[invariant]
runs = 100

# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options
