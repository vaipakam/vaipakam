<!doctype html>
<html lang="en">
  <head>
    <!-- Theme bootstrap. Runs before any CSS or React loads so the
         `data-theme` attribute is set during the very first paint —
         no flash of wrong-theme. The order matches ThemeContext:
         (1) honour an explicit user choice in localStorage; otherwise
         (2) follow `prefers-color-scheme`. Wrapped in try/catch so a
         disabled-storage privacy mode falls back gracefully to the
         system preference instead of breaking the page. -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('vaipakam-theme');
          var theme;
          if (stored === 'light' || stored === 'dark') {
            theme = stored;
          } else {
            theme = window.matchMedia('(prefers-color-scheme: dark)').matches
              ? 'dark'
              : 'light';
          }
          document.documentElement.setAttribute('data-theme', theme);
        } catch (_) {
          var fallback = window.matchMedia('(prefers-color-scheme: dark)').matches
            ? 'dark'
            : 'light';
          document.documentElement.setAttribute('data-theme', fallback);
        }
      })();
    </script>
    <!-- Google tag (gtag.js) with Consent Mode v2 (Advanced).
         Consent defaults are set BEFORE the gtag loader fires — so no
         analytics/ads storage is created until the user explicitly opts
         in via the consent banner. `functionality_storage` and
         `security_storage` are granted because they cover essential
         session/anti-abuse cookies, not tracking.
         `wait_for_update: 500` holds the initial pageview for up to half
         a second while the banner hydrates and the user's stored choice
         is re-applied, so we don't double-fire.
         `ads_data_redaction` redacts any ad-click identifiers (gclid /
         dclid) in outbound network requests while `ad_storage` is
         denied — defense-in-depth in case any future ad integration
         adds a pixel. `url_passthrough` preserves conversion-attribution
         params via URL rewriting when cookies are denied. Both are
         Google's recommended defaults for Advanced Consent Mode. -->
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('consent', 'default', {
        ad_storage: 'denied',
        ad_user_data: 'denied',
        ad_personalization: 'denied',
        analytics_storage: 'denied',
        personalization_storage: 'denied',
        functionality_storage: 'granted',
        security_storage: 'granted',
        wait_for_update: 500,
      });
      gtag('set', 'ads_data_redaction', true);
      gtag('set', 'url_passthrough', true);
      gtag('js', new Date());
      gtag('config', 'G-KSL61Z65BF');
    </script>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-KSL61Z65BF"></script>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo-dark.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Vaipakam | Decentralized P2P Lending & NFT Rentals</title>
    <meta name="description" content="Lend and borrow ERC-20 tokens. Rent NFTs. Set your own terms. Trustless, transparent, fully on-chain." />
    <!-- Phase 9 PWA — manifest + theme + apple-touch icons let mobile
         users add Vaipakam to their home screen with a proper standalone
         shell, a branded theme color, and offline-friendly caching from
         the service worker registered in src/main.tsx. -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#4f46e5" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Vaipakam" />
    <link rel="apple-touch-icon" href="/icon-dark.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
