<!doctype html>
<html lang="en">
  <head>
    <!-- Theme + language bootstrap. Runs before any CSS or React
         loads so the `data-theme` / `lang` / `dir` attributes are
         set during the very first paint — no flash of wrong theme,
         no flash of LTR layout for an RTL user.

         Read order (mirrors ThemeContext + i18n bootstrap):
           (1) `vaipakam_theme` / `vaipakam_lang` cookie at the
               `.vaipakam.com` parent scope — cross-subdomain truth
               so a choice on labs.vaipakam.com is honoured here.
           (2) localStorage `vaipakam-theme` / `vaipakam:language` —
               same-origin fallback for cookie-disabled clients.
           (3) System / browser preference (`prefers-color-scheme`,
               `navigator.language`).

         Wrapped in try/catch so disabled-storage / private mode
         falls back gracefully to system defaults instead of
         breaking the page. -->
    <script>
      (function () {
        function readCookie(name) {
          var prefix = name + '=';
          var parts = document.cookie ? document.cookie.split(';') : [];
          for (var i = 0; i < parts.length; i++) {
            var seg = parts[i].replace(/^\s+/, '');
            if (seg.indexOf(prefix) === 0) {
              try { return decodeURIComponent(seg.slice(prefix.length)); } catch (_) { return null; }
            }
          }
          return null;
        }

        // ── Theme ──────────────────────────────────────────────
        var theme;
        try {
          var cookieTheme = readCookie('vaipakam_theme');
          if (cookieTheme === 'light' || cookieTheme === 'dark') {
            theme = cookieTheme;
          } else {
            var stored = localStorage.getItem('vaipakam-theme');
            if (stored === 'light' || stored === 'dark') {
              theme = stored;
            } else {
              theme = window.matchMedia('(prefers-color-scheme: dark)').matches
                ? 'dark'
                : 'light';
            }
          }
        } catch (_) {
          theme = window.matchMedia('(prefers-color-scheme: dark)').matches
            ? 'dark'
            : 'light';
        }
        document.documentElement.setAttribute('data-theme', theme);

        // ── Language + direction ───────────────────────────────
        // We don't change visible text here (i18next does that
        // on mount), but setting `lang` and `dir` early lets RTL
        // layout (Arabic, Hebrew, Farsi, Urdu) paint correctly on
        // first frame instead of flashing LTR.
        var SUPPORTED = ['en','ar','de','es','fr','hi','ja','ko','ta','zh'];
        var RTL = ['ar','he','fa','ur'];
        var lang = null;
        try {
          var cookieLang = readCookie('vaipakam_lang');
          if (cookieLang && SUPPORTED.indexOf(cookieLang) !== -1) {
            lang = cookieLang;
          } else {
            var storedLang = localStorage.getItem('vaipakam:language');
            if (storedLang && SUPPORTED.indexOf(storedLang) !== -1) {
              lang = storedLang;
            } else if (navigator.language) {
              var nav = navigator.language.toLowerCase().split('-')[0];
              if (SUPPORTED.indexOf(nav) !== -1) lang = nav;
            }
          }
        } catch (_) { /* keep lang === null */ }
        if (lang) {
          document.documentElement.setAttribute('lang', lang);
          document.documentElement.setAttribute(
            'dir',
            RTL.indexOf(lang) !== -1 ? 'rtl' : 'ltr'
          );
        }
      })();
    </script>
    <!-- Google tag (gtag.js) with Consent Mode v2 (Advanced).
         Consent defaults are set BEFORE the gtag loader fires — so no
         analytics/ads storage is created until the user explicitly opts
         in via the consent banner. `functionality_storage` and
         `security_storage` are granted because they cover essential
         session/anti-abuse cookies, not tracking.
         `wait_for_update: 500` holds the initial pageview for up to half
         a second while the banner hydrates and the user's stored choice
         is re-applied, so we don't double-fire.
         `ads_data_redaction` redacts any ad-click identifiers (gclid /
         dclid) in outbound network requests while `ad_storage` is
         denied — defense-in-depth in case any future ad integration
         adds a pixel. `url_passthrough` preserves conversion-attribution
         params via URL rewriting when cookies are denied. Both are
         Google's recommended defaults for Advanced Consent Mode. -->
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('consent', 'default', {
        ad_storage: 'denied',
        ad_user_data: 'denied',
        ad_personalization: 'denied',
        analytics_storage: 'denied',
        personalization_storage: 'denied',
        functionality_storage: 'granted',
        security_storage: 'granted',
        wait_for_update: 500,
      });
      gtag('set', 'ads_data_redaction', true);
      gtag('set', 'url_passthrough', true);
      gtag('js', new Date());
      gtag('config', 'G-KSL61Z65BF');
    </script>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-KSL61Z65BF"></script>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo-dark.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Vaipakam | Decentralized P2P Lending & NFT Rentals</title>
    <meta name="description" content="Lend and borrow ERC-20 tokens. Rent NFTs. Set your own terms. Trustless, transparent, fully on-chain." />
    <!-- Phase 9 PWA — manifest + theme + apple-touch icons let mobile
         users add Vaipakam to their home screen with a proper standalone
         shell, a branded theme color, and offline-friendly caching from
         the service worker registered in src/main.tsx. -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#4f46e5" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Vaipakam" />
    <link rel="apple-touch-icon" href="/icon-dark.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
