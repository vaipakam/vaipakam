<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="color-scheme" content="light dark" />
    <meta
      name="description"
      content="Vaipakam — lend, borrow, and rent NFTs directly with other people. Your assets stay in your own on-chain vault."
    />
    <title>Vaipakam</title>
    <script>
      // Apply the persisted (or system) theme before first paint so the
      // page never flashes the wrong background. Kept inline + tiny on
      // purpose; the React ThemeProvider takes over after hydration.
      (function () {
        try {
          var stored = localStorage.getItem('alpha02.theme');
          var theme =
            stored === 'light' || stored === 'dark'
              ? stored
              : window.matchMedia('(prefers-color-scheme: dark)').matches
                ? 'dark'
                : 'light';
          document.documentElement.dataset.theme = theme;
        } catch (e) {
          document.documentElement.dataset.theme = 'light';
        }
      })();
    </script>
    <script>
      // Language + direction bootstrap — mirrors the i18n detection
      // chain (packages/i18n createI18n.ts) so `lang`/`dir` are right
      // during the very first paint: no flash of LTR layout for an RTL
      // user, correct `lang` for screen readers before React mounts.
      // Read order: (1) `vaipakam_lang` cookie at the `.vaipakam.com`
      // parent scope — cross-subdomain truth, a choice made on
      // vaipakam.com is honoured here; (2) localStorage
      // `vaipakam:language`; (3) navigator.language. The SUPPORTED
      // list mirrors SUPPORTED_LOCALES in packages/i18n (keep in
      // sync), RTL mirrors RTL_LOCALES.
      (function () {
        function readCookie(name) {
          var prefix = name + '=';
          var parts = document.cookie ? document.cookie.split(';') : [];
          for (var i = 0; i < parts.length; i++) {
            var seg = parts[i].replace(/^\s+/, '');
            if (seg.indexOf(prefix) === 0) {
              try { return decodeURIComponent(seg.slice(prefix.length)); } catch (_) { return null; }
            }
          }
          return null;
        }
        var SUPPORTED = ['en','es','fr','de','ja','zh','hi','ar','ta','ko','te','kn','ml','bn','mr','pa','gu','ur','vi','th','tl','id','pt','ru','uk','tr','it','nl','pl','el','cs','fa','he','sw'];
        // TRANSLATED gates the lang/dir STAMP for every detection leg
        // (cookie, localStorage, navigator): <html lang> declares the
        // language of the text actually rendered, and a locale whose
        // bundle isn't translated yet renders English fallback — so
        // English stays declared until the translation ships, no
        // matter how the preference arrived (Codex #1309 r5). The
        // PREFERENCE itself still round-trips via cookie/localStorage
        // untouched. Mirrors TRANSLATED_LOCALES in
        // src/i18n/localeConfig.ts — grow both together.
        var TRANSLATED = ['en', 'es', 'ja', 'hi', 'zh', 'ta', 'fr', 'de', 'ar'];
        var RTL = ['ar', 'he', 'fa', 'ur'];
        var lang = null;
        try {
          var cookieLang = readCookie('vaipakam_lang');
          if (cookieLang && SUPPORTED.indexOf(cookieLang) !== -1) {
            lang = cookieLang;
          } else {
            var storedLang = localStorage.getItem('vaipakam:language');
            if (storedLang && SUPPORTED.indexOf(storedLang) !== -1) {
              lang = storedLang;
            } else if (navigator.language) {
              var nav = navigator.language.toLowerCase().split('-')[0];
              if (SUPPORTED.indexOf(nav) !== -1) lang = nav;
            }
          }
        } catch (_) { /* keep lang === null (stay with the static lang="en") */ }
        // Content-language gate: stamp only translated locales.
        if (lang && TRANSLATED.indexOf(lang) === -1) lang = null;
        if (lang) {
          document.documentElement.setAttribute('lang', lang);
          document.documentElement.setAttribute(
            'dir',
            RTL.indexOf(lang) !== -1 ? 'rtl' : 'ltr'
          );
        }
      })();
    </script>
    <style>
      /* UX-005 — a boot splash that paints from the HTML itself, before
         the JS bundle loads or executes. On a slow connection the app
         used to show a pure white page for 12s+; now the brand mark +
         a spinner appear instantly and are replaced the moment React
         mounts into #root. Theme-aware via the data-theme set above. */
      #boot-splash {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 20px;
        background: #f7f8fa;
        color: #1a1a1a;
        font-family:
          system-ui,
          -apple-system,
          'Segoe UI',
          Roboto,
          sans-serif;
      }
      :root[data-theme='dark'] #boot-splash {
        background: #0f1115;
        color: #e6e8eb;
      }
      #boot-splash .boot-mark {
        display: flex;
        align-items: center;
        gap: 10px;
        font-size: 1.25rem;
        font-weight: 700;
      }
      #boot-splash .boot-badge {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 34px;
        height: 34px;
        border-radius: 9px;
        background: #4f46e5;
        color: #fff;
        font-weight: 800;
      }
      #boot-splash .boot-spinner {
        width: 26px;
        height: 26px;
        border: 3px solid rgba(128, 128, 128, 0.3);
        border-top-color: #4f46e5;
        border-radius: 50%;
        animation: boot-spin 0.8s linear infinite;
      }
      #boot-splash .boot-hint {
        font-size: 0.85rem;
        opacity: 0.7;
        max-width: 36ch;
        text-align: center;
      }
      #boot-splash .boot-reload {
        padding: 8px 22px;
        border: 0;
        border-radius: 9px;
        background: #4f46e5;
        color: #fff;
        font: inherit;
        font-weight: 600;
        cursor: pointer;
      }
      @keyframes boot-spin {
        to {
          transform: rotate(360deg);
        }
      }
      @media (prefers-reduced-motion: reduce) {
        /* Match the app's .spin rule — reduced-motion means NO spin,
           not a slower one (Codex #1169 r2). A static ring still reads
           as "loading" alongside the "Starting up…" text. */
        #boot-splash .boot-spinner {
          animation: none;
        }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <!-- Removed by React on mount (it replaces #root's children). A
           slow bundle fetch therefore shows this, never a blank page. -->
      <div id="boot-splash">
        <div class="boot-mark">
          <span class="boot-badge">V</span>
          Vaipakam
        </div>
        <div class="boot-spinner" role="status" aria-label="Loading"></div>
        <div class="boot-hint">Starting up…</div>
      </div>
    </div>
    <script>
      // UX2-002 — the splash must be able to FAIL loudly. If a chunk
      // drops on a flaky network, React never mounts and the spinner
      // used to spin forever with no message and no way out. The app's
      // own vite:preloadError reload handler can't rescue this case —
      // it lives inside the bundle that failed to load — so this
      // handler stays HERE in the HTML, independent of every asset
      // that can fail. 20s is far beyond the measured warm boot
      // (FCP 0.7–2 s); a normal boot removes #boot-splash long before
      // the timer fires and the check no-ops.
      setTimeout(function () {
        var splash = document.getElementById('boot-splash');
        if (!splash) return; // React mounted — the normal path.
        var spinner = splash.querySelector('.boot-spinner');
        if (spinner) spinner.style.display = 'none';
        var hint = splash.querySelector('.boot-hint');
        if (hint) {
          hint.textContent =
            'This is taking longer than it should — check your connection and reload.';
          hint.style.opacity = '1';
        }
        var btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'boot-reload';
        btn.textContent = 'Reload';
        btn.addEventListener('click', function () {
          location.reload();
        });
        splash.appendChild(btn);
      }, 20000);
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
