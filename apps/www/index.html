<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vaipakam — Decentralized P2P Lending, Borrowing & NFT Rental</title>
    <meta
      name="description"
      content="Vaipakam is a decentralized vault-to-vault lending, borrowing and NFT rental protocol. Set your own terms, lend or borrow any token, rent NFTs — no pool, no middleman."
    />
    <!-- Default share/unfurl meta — usePageMeta rewrites these per
         route at runtime (and the prerender pass bakes the per-page
         values into each snapshot); this static set is what a scraper
         that reads only the raw shell sees. -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Vaipakam" />
    <meta property="og:title" content="Vaipakam — Decentralized P2P Lending, Borrowing & NFT Rental" />
    <meta
      property="og:description"
      content="Vaipakam is a decentralized vault-to-vault lending, borrowing and NFT rental protocol. Set your own terms, lend or borrow any token, rent NFTs — no pool, no middleman."
    />
    <meta property="og:url" content="https://vaipakam.com/" />
    <meta property="og:image" content="https://vaipakam.com/banner.png" />
    <meta property="og:locale" content="en" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Vaipakam — Decentralized P2P Lending, Borrowing & NFT Rental" />
    <meta
      name="twitter:description"
      content="Vaipakam is a decentralized vault-to-vault lending, borrowing and NFT rental protocol. Set your own terms, lend or borrow any token, rent NFTs — no pool, no middleman."
    />
    <meta name="twitter:image" content="https://vaipakam.com/banner.png" />
    <!-- Theme + language bootstrap. Runs before any CSS or React
         loads so the `data-theme` / `lang` / `dir` attributes are
         set during the very first paint — no flash of wrong theme,
         no flash of LTR layout for an RTL user.

         Read order (mirrors ThemeContext + i18n bootstrap):
           (1) `vaipakam_theme` / `vaipakam_lang` cookie at the
               `.vaipakam.com` parent scope — cross-subdomain truth
               so a choice on defi.vaipakam.com is honoured here.
           (2) localStorage `vaipakam-theme` / `vaipakam:language` —
               same-origin fallback for cookie-disabled clients.
           (3) System / browser preference (`prefers-color-scheme`,
               `navigator.language`).

         Wrapped in try/catch so disabled-storage / private mode
         falls back gracefully to system defaults instead of
         breaking the page. -->
    <script>
      (function () {
        function readCookie(name) {
          var prefix = name + '=';
          var parts = document.cookie ? document.cookie.split(';') : [];
          for (var i = 0; i < parts.length; i++) {
            var seg = parts[i].replace(/^\s+/, '');
            if (seg.indexOf(prefix) === 0) {
              try { return decodeURIComponent(seg.slice(prefix.length)); } catch (_) { return null; }
            }
          }
          return null;
        }

        // ── Theme ──────────────────────────────────────────────
        var theme;
        try {
          var cookieTheme = readCookie('vaipakam_theme');
          if (cookieTheme === 'light' || cookieTheme === 'dark') {
            theme = cookieTheme;
          } else {
            var stored = localStorage.getItem('vaipakam-theme');
            if (stored === 'light' || stored === 'dark') {
              theme = stored;
            } else {
              theme = window.matchMedia('(prefers-color-scheme: dark)').matches
                ? 'dark'
                : 'light';
            }
          }
        } catch (_) {
          theme = window.matchMedia('(prefers-color-scheme: dark)').matches
            ? 'dark'
            : 'light';
        }
        document.documentElement.setAttribute('data-theme', theme);

        // ── Language + direction ───────────────────────────────
        // We don't change visible text here (i18next does that
        // on mount), but setting `lang` and `dir` early lets RTL
        // layout (Arabic, Hebrew, Farsi, Urdu) paint correctly on
        // first frame instead of flashing LTR.
        var SUPPORTED = ['en','ar','de','es','fr','hi','ja','ko','ta','zh'];
        var RTL = ['ar','he','fa','ur'];
        var lang = null;
        try {
          // (0) URL locale prefix — authoritative on this site:
          //     locale-prefixed URLs are distinct localized pages and
          //     the prerender pass bakes the SAME value into each
          //     snapshot's <html>, so an /ar/... snapshot must never
          //     be re-stamped from a cookie / navigator preference —
          //     that would flip the already-rendered Arabic body to
          //     lang="en"/ltr for the first paint, exactly the flash
          //     this bootstrap exists to prevent (Codex #1309 r10).
          var seg = window.location.pathname.split('/')[1];
          if (seg && SUPPORTED.indexOf(seg) !== -1) {
            lang = seg;
          } else {
            var cookieLang = readCookie('vaipakam_lang');
            if (cookieLang && SUPPORTED.indexOf(cookieLang) !== -1) {
              lang = cookieLang;
            } else {
              var storedLang = localStorage.getItem('vaipakam:language');
              if (storedLang && SUPPORTED.indexOf(storedLang) !== -1) {
                lang = storedLang;
              } else if (navigator.language) {
                var nav = navigator.language.toLowerCase().split('-')[0];
                if (SUPPORTED.indexOf(nav) !== -1) lang = nav;
              }
            }
          }
        } catch (_) { /* keep lang === null */ }
        if (lang) {
          document.documentElement.setAttribute('lang', lang);
          document.documentElement.setAttribute(
            'dir',
            RTL.indexOf(lang) !== -1 ? 'rtl' : 'ltr'
          );
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
