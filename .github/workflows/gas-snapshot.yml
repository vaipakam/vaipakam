# Gas-snapshot regression check
# ------------------------------
# Compares the per-test gas usage in this PR against the committed
# `contracts/.gas-snapshot` baseline. Fails if any test regresses by
# more than the configured tolerance.
#
# Why this matters for the audit story:
# - A reviewer can ask "did this change make the protocol more
#   expensive to use?" and get a per-test answer without re-running
#   the suite locally.
# - Gas regressions often signal accidental algorithmic changes
#   (e.g. an O(1) lookup turned into an O(n) scan during refactor).
#   The snapshot makes those visible at PR review time.
#
# Convention: when you legitimately add gas (new feature, more storage
# writes, new event), regenerate the snapshot with:
#   cd contracts && nice -n -10 ionice -c 2 -n 0 forge snapshot \
#     --no-match-path "test/invariants/*" \
#     --no-match-test '(_Sanctions_(AcceptOffer|SellLoan|TransferObligation)_Blocked|testSellLoanRevertsCountriesNotCompatible|testAcceptOfferBlocksSanctionedCountries)'
# and commit the diff alongside the code change. CI then compares the
# new commit against the new snapshot using the same exclusions.
#
# Why the `--no-match-test` regex: forge's `--check --tolerance` has a
# divide-by-zero quirk on tests that report `(gas: 0)` â€” five early-
# revert sanctions/country tests trigger that quirk. Skipping them in
# both snapshot generation and the check loses no detection value
# (their actual gas IS zero) and avoids cosmetic CI failures.

name: Gas snapshot

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: gas-snapshot-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write   # for posting the gas-diff comment

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      contracts: ${{ steps.filter.outputs.contracts }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 2
      - id: filter
        env:
          # Use event-payload SHAs rather than `origin/<base_ref>` â€” the
          # remote ref isn't reliably present after a shallow checkout.
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "push" ]]; then
            echo "contracts=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [[ -z "$BASE_SHA" ]] || ! git cat-file -e "$BASE_SHA^{commit}" 2>/dev/null; then
            # Fall open if the base SHA isn't in our shallow clone.
            echo "contracts=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          changed="$(git diff --name-only "$BASE_SHA" "$HEAD_SHA")"
          # `contracts/lib/**` covers submodule pointer bumps â€” a
          # chainlink-evm / chainlink-ccip / OZ-upgradeable submodule
          # update can shift gas without touching `contracts/src/`,
          # so it has to gate the regression check.
          if printf '%s\n' "$changed" | grep -qE '^contracts/(src|test|script|lib)/|^contracts/foundry\.toml$|^contracts/remappings\.txt$|^\.gitmodules$|^contracts/\.gas-snapshot$|^\.github/workflows/gas-snapshot\.yml$'; then
            echo "contracts=true" >> "$GITHUB_OUTPUT"
          else
            echo "contracts=false" >> "$GITHUB_OUTPUT"
          fi

  gas-snapshot:
    name: Gas snapshot diff
    needs: detect-changes
    if: needs.detect-changes.outputs.contracts == 'true'
    runs-on: ubuntu-latest
    # Snapshot regenerates the full suite â€” same envelope as
    # contracts-full. Cold-cache cap mirrors that job.
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@c7450ba673e133f5ee30098b3b54f444d3a2ca2d # v1

      # Reuse the same foundry artifact cache the contracts jobs warm.
      # `restore-key` shape lets us hit even on a config-stable miss.
      - name: Snapshot submodule SHAs
        run: |
          cd contracts
          git submodule status --recursive > .submodule-state

      - name: Restore foundry cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            contracts/out
            contracts/cache
          key: forge-${{ runner.os }}-${{ hashFiles('contracts/foundry.toml', 'contracts/remappings.txt', 'contracts/.submodule-state') }}-${{ hashFiles('contracts/src/**/*.sol', 'contracts/script/**/*.sol', 'contracts/test/**/*.sol') }}
          restore-keys: |
            forge-${{ runner.os }}-${{ hashFiles('contracts/foundry.toml', 'contracts/remappings.txt', 'contracts/.submodule-state') }}-

      - name: Forge snapshot --check (5% tolerance)
        # `--tolerance` is a percentage (0-100), not basis points.
        # 5 = 5%. Any test whose gas increases by more than 5% from
        # the committed baseline fails the run.
        #
        # `--no-match-path "test/invariants/*"` matches the local
        # convention for snapshot generation; invariant tests run a
        # randomised harness whose gas is non-deterministic.
        #
        # `--no-match-test '(_Sanctions_...|test...CountriesNotCompatible|test...BlocksSanctionedCountries)'`
        # skips five early-revert tests that report `(gas: 0)`. forge's
        # tolerance math divides by the expected gas; when that's zero
        # any consumed value (including 0 itself) triggers a false
        # "Diff" failure. The regex must match the same set used at
        # snapshot generation time (see the file-header convention).
        #
        # NOTE: local development prefixes forge with
        # `nice -n -10 ionice -c 2 -n 0` for priority on a shared
        # workstation. GitHub-hosted runners deny `CAP_SYS_NICE` so
        # the prefix would error here â€” dropped from the CI step
        # (the failure-remediation summary below still names it for
        # local use).
        run: |
          cd contracts
          forge snapshot --check --tolerance 5 \
            --no-match-path "test/invariants/*" \
            --no-match-test '(_Sanctions_(AcceptOffer|SellLoan|TransferObligation)_Blocked|testSellLoanRevertsCountriesNotCompatible|testAcceptOfferBlocksSanctionedCountries)'

      - name: Diff hint on failure
        # When the check fails (gas regression), drop a one-line
        # remediation guide into the job summary so the contributor
        # knows what to run locally to update the baseline.
        if: failure()
        run: |
          {
            echo "## â›˝ Gas regression detected"
            echo ""
            echo "One or more tests exceed the +5% gas tolerance vs"
            echo "the committed \`contracts/.gas-snapshot\`."
            echo ""
            echo "Options:"
            echo "1. **Reduce the gas** â€” investigate the regressing test(s) and"
            echo "   identify the source. Often an accidental O(n) where O(1)"
            echo "   was expected, or a redundant storage write."
            echo "2. **Accept the regression** (legitimate cost of a new feature):"
            echo "   regenerate the snapshot locally and commit:"
            echo "   \`\`\`bash"
            echo "   cd contracts && nice -n -10 ionice -c 2 -n 0 forge snapshot \\"
            echo "     --no-match-path \"test/invariants/*\" \\"
            echo "     --no-match-test '(_Sanctions_(AcceptOffer|SellLoan|TransferObligation)_Blocked|testSellLoanRevertsCountriesNotCompatible|testAcceptOfferBlocksSanctionedCountries)'"
            echo "   git add contracts/.gas-snapshot"
            echo "   \`\`\`"
            echo ""
            echo "See \`docs/internal/ProjectProcedures.md\` for the snapshot convention."
          } >> "$GITHUB_STEP_SUMMARY"
