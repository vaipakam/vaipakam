# Gas-snapshot regression check
# ------------------------------
# Compares the per-test gas usage in this PR against the committed
# `contracts/.gas-snapshot` baseline. Fails if any test regresses by
# more than the configured tolerance.
#
# Why this matters for the audit story:
# - A reviewer can ask "did this change make the protocol more
#   expensive to use?" and get a per-test answer without re-running
#   the suite locally.
# - Gas regressions often signal accidental algorithmic changes
#   (e.g. an O(1) lookup turned into an O(n) scan during refactor).
#   The snapshot makes those visible at PR review time.
#
# Convention: when you legitimately add gas (new feature, more storage
# writes, new event), regenerate the snapshot with:
#   cd contracts && nice -n -10 ionice -c 2 -n 0 forge snapshot --no-match-path "test/invariants/*"
# and commit the diff alongside the code change. CI then compares the
# new commit against the new snapshot.

name: Gas snapshot

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: gas-snapshot-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write   # for posting the gas-diff comment

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      contracts: ${{ steps.filter.outputs.contracts }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 2
      - id: filter
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "push" ]]; then
            echo "contracts=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          BASE_SHA="$(git merge-base origin/${{ github.base_ref }} HEAD || echo '')"
          if [[ -z "$BASE_SHA" ]]; then
            echo "contracts=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          changed="$(git diff --name-only "$BASE_SHA" HEAD)"
          if printf '%s\n' "$changed" | grep -qE '^contracts/(src|test|script)/|^contracts/foundry\.toml$|^contracts/remappings\.txt$|^\.gitmodules$|^contracts/\.gas-snapshot$|^\.github/workflows/gas-snapshot\.yml$'; then
            echo "contracts=true" >> "$GITHUB_OUTPUT"
          else
            echo "contracts=false" >> "$GITHUB_OUTPUT"
          fi

  gas-snapshot:
    name: Gas snapshot diff
    needs: detect-changes
    if: needs.detect-changes.outputs.contracts == 'true'
    runs-on: ubuntu-latest
    # Snapshot regenerates the full suite — same envelope as
    # contracts-full. Cold-cache cap mirrors that job.
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@c7450ba673e133f5ee30098b3b54f444d3a2ca2d # v1

      # Reuse the same foundry artifact cache the contracts jobs warm.
      # `restore-key` shape lets us hit even on a config-stable miss.
      - name: Snapshot submodule SHAs
        run: |
          cd contracts
          git submodule status --recursive > .submodule-state

      - name: Restore foundry cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            contracts/out
            contracts/cache
          key: forge-${{ runner.os }}-${{ hashFiles('contracts/foundry.toml', 'contracts/remappings.txt', 'contracts/.submodule-state') }}-${{ hashFiles('contracts/src/**/*.sol', 'contracts/script/**/*.sol', 'contracts/test/**/*.sol') }}
          restore-keys: |
            forge-${{ runner.os }}-${{ hashFiles('contracts/foundry.toml', 'contracts/remappings.txt', 'contracts/.submodule-state') }}-

      - name: Forge snapshot --check (5% tolerance)
        # `--tolerance 500` is in basis points: 500 = 5%. Any test
        # whose gas increases by more than 5% from the committed
        # baseline fails the run.
        #
        # `--no-match-path "test/invariants/*"` matches the local
        # convention for snapshot generation; invariant tests run a
        # randomised harness whose gas is non-deterministic.
        run: |
          cd contracts
          nice -n -10 ionice -c 2 -n 0 forge snapshot --check --tolerance 500 --no-match-path "test/invariants/*"

      - name: Diff hint on failure
        # When the check fails (gas regression), drop a one-line
        # remediation guide into the job summary so the contributor
        # knows what to run locally to update the baseline.
        if: failure()
        run: |
          {
            echo "## ⛽ Gas regression detected"
            echo ""
            echo "One or more tests exceed the +5% gas tolerance vs"
            echo "the committed \`contracts/.gas-snapshot\`."
            echo ""
            echo "Options:"
            echo "1. **Reduce the gas** — investigate the regressing test(s) and"
            echo "   identify the source. Often an accidental O(n) where O(1)"
            echo "   was expected, or a redundant storage write."
            echo "2. **Accept the regression** (legitimate cost of a new feature):"
            echo "   regenerate the snapshot locally and commit:"
            echo "   \`\`\`bash"
            echo "   cd contracts && nice -n -10 ionice -c 2 -n 0 forge snapshot --no-match-path \"test/invariants/*\""
            echo "   git add contracts/.gas-snapshot"
            echo "   \`\`\`"
            echo ""
            echo "See \`docs/internal/ProjectProcedures.md\` for the snapshot convention."
          } >> "$GITHUB_STEP_SUMMARY"
