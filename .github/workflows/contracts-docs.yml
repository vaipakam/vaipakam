# Contracts documentation site — auto-generated NatSpec docs published
# to GitHub Pages on every push to `main`.
#
# Why this exists:
# - Auditors browsing the protocol can read the per-function NatSpec
#   in a navigable form without cloning + running `forge doc` locally.
# - Ecosystem integrators (keeper-bot authors, indexer authors) get a
#   discoverable API surface for every facet.
# - The site is built directly from the source — no risk of drift
#   between "what the docs say" and "what the contract does", since
#   NatSpec lives next to the code.
#
# Site URL (once GitHub Pages is enabled in repo Settings):
#   https://vaipakam.github.io/vaipakam/
#
# Trigger discipline:
# - `main` push: rebuilds + deploys.
# - PRs: builds only (artifact upload, no deploy) — lets reviewers
#   confirm the build hasn't broken before merging.
# - `workflow_dispatch`: manual rebuild + deploy (for cache-bust or
#   after a stuck deploy).

name: Contracts docs

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - 'contracts/src/**/*.sol'
      - 'contracts/foundry.toml'
      - 'contracts/remappings.txt'
      - 'contracts/lib/**'        # submodule gitlink pointer bumps shift forge doc output too
      - '.gitmodules'
      - '.github/workflows/contracts-docs.yml'
  workflow_dispatch:

# Concurrency scoping:
# - PR preview builds get their own per-PR group so two PRs don't fight,
#   and a new PR build can supersede an older one for the same PR.
# - Push-to-main / workflow_dispatch deploys share the `pages-deploy`
#   group so the Pages site never has overlapping deploys.
# A flat workflow-level `pages` group with cancel-in-progress was wrong:
# PR builds would cancel in-flight production deploys to the live site.
concurrency:
  group: ${{ github.event_name == 'pull_request' && format('contracts-docs-pr-{0}', github.event.pull_request.number) || 'contracts-docs-pages-deploy' }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    name: Build docs
    runs-on: ubuntu-latest
    # forge doc on Vaipakam's contract surface (49 facets + libs + lots
    # of NatSpec) takes 12-20 min cold; the original 15-min cap clipped
    # the very first PR run. Bumped to 30; foundry cache below makes
    # subsequent runs much faster.
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@c7450ba673e133f5ee30098b3b54f444d3a2ca2d # v1

      - name: Snapshot submodule SHAs (for content-based cache key)
        run: |
          cd contracts
          git submodule status --recursive > .submodule-state

      - name: Restore foundry cache
        # Reuse the same cache key shape the contracts jobs warm — so
        # docs builds ride on whatever forge artifacts a prior `forge
        # build` already produced (whether from this workflow, ci.yml,
        # or the gas-snapshot workflow).
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            contracts/out
            contracts/cache
          key: forge-${{ runner.os }}-${{ hashFiles('contracts/foundry.toml', 'contracts/remappings.txt', 'contracts/.submodule-state') }}-${{ hashFiles('contracts/src/**/*.sol', 'contracts/script/**/*.sol', 'contracts/test/**/*.sol') }}
          restore-keys: |
            forge-${{ runner.os }}-${{ hashFiles('contracts/foundry.toml', 'contracts/remappings.txt', 'contracts/.submodule-state') }}-

      - name: Forge doc --build
        # Builds an mdbook tree under `contracts/docs/book` from the
        # per-function NatSpec comments in `contracts/src/`. No CI-side
        # config — the output is governed by `foundry.toml [doc]`.
        run: |
          cd contracts
          forge doc --build

      - name: Inject site root + redirect
        # GitHub Pages serves the artifact's root as the site root.
        # `forge doc` writes into `contracts/docs/book`; we publish
        # that directory.
        run: |
          set -euo pipefail
          if [[ ! -d contracts/docs/book ]]; then
            echo "::error::forge doc did not produce contracts/docs/book"
            ls -la contracts/docs/ 2>/dev/null || true
            exit 1
          fi
          # Drop a tiny landing breadcrumb so visitors hitting the
          # site root understand what they're looking at.
          cat > contracts/docs/book/CONTEXT.md <<'EOF'
          # Vaipakam Contracts — auto-generated API docs
          Generated by `forge doc` from per-function NatSpec.
          For protocol-level docs, read:
          - [Repository root](https://github.com/vaipakam/vaipakam)
          - [Operator handbook](https://github.com/vaipakam/vaipakam/blob/main/docs/internal/ProjectProcedures.md)
          - [Architecture Decision Records](https://github.com/vaipakam/vaipakam/tree/main/docs/adr)
          - [Glossary](https://github.com/vaipakam/vaipakam/blob/main/docs/GLOSSARY.md)
          - [Functional specs](https://github.com/vaipakam/vaipakam/tree/main/docs/FunctionalSpecs)
          EOF

      - name: Configure GitHub Pages
        if: github.event_name != 'pull_request'
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - name: Upload Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: contracts/docs/book

      - name: Upload PR-preview artifact
        if: github.event_name == 'pull_request'
        # On PRs, upload as a regular artifact so reviewers can
        # download + inspect without enabling Pages writes for forks.
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: contracts-docs-pr-${{ github.event.pull_request.number }}
          path: contracts/docs/book
          retention-days: 7

  deploy:
    name: Deploy to Pages
    # Only deploys on push-to-main / manual trigger, never on PRs.
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
