# CI — required-check workflow gating every PR to main.
#
# Six jobs total, split into a fast required-check tier and slower
# informational tiers, all sharing ONE warm foundry cache. The cheap
# checks run BEFORE the expensive forge build so a TypeScript-side
# failure doesn't burn a 10-min cold forge build before surfacing:
#
#   detect-changes (required, ~30s)
#     ↓
#   workspaces             (required, ~2-3 min) ┬─ cheap fail-fast
#   analyze-jstypescript   (informational, ~2 min) ┘  gates
#     ↓
#   contracts-fast (required, ~10 min cold) ← does the ONLY cold
#       ↓                                     forge build per PR;
#       │                                     saves cache for the
#       │                                     informational tier
#       │                                     below to restore
#       ├── contracts-full (REQUIRED on contracts-touching PRs;
#       │                   skipped-as-success on docs-only PRs; full
#       │                   forge test regression)
#       ├── gas-snapshot   (informational; `forge snapshot --check`)
#       └── slither        (informational; Solidity static analysis,
#                           reads slither.config.json filter_paths)
#
# Weekly cron (Mondays 06:17 UTC) inherited from the retired
# codeql.yml — re-runs the full graph against main to catch CodeQL-
# pack drift, submodule pin drift, and dep-bump-triggered failures
# between commit-driven runs.
#
# All four contract-touching jobs share the identical content-based
# cache key — one forge cold-build per PR, the rest restore-and-go.
# Pre-2026-05-21 this workflow only owned `contracts-{fast,full}`;
# gas-snapshot and slither lived in their own workflow files that ran
# in parallel, so a contracts-touching PR cold-built forge up to three
# times. Folded both in here so the per-PR compute-unit cost drops to
# one cold build. Wall-clock to merge-ready (contracts-fast — the
# gating check) is UNCHANGED; informational tiers arrive ~5-10 min
# later on cold-cache PRs, which is the deliberate trade-off (see
# feedback_ci_compute_over_wall_clock in agent memory).
#
# Jobs in the original required-check shape:
#
#   contracts-fast    `bash contracts/script/predeploy-check.sh` (no
#                     `--full`) — forge build + deploy-sanity suite
#                     (`test/deploy/*`) + ABI-in-sync check + shell-script
#                     lint. ~30-60 s. Catches the deploy-blocker regression
#                     classes (#66 size, #71 selector coverage, #72
#                     ownership, #75 ABI, #69 facet-count).
#
#   contracts-full    `bash contracts/script/predeploy-check.sh --full` —
#                     the full 2,012-test regression. Same script the
#                     mainnet runbook invokes at preflight step [1b].
#                     ~10-15 min. CONDITIONALLY REQUIRED — listed in
#                     the Protect main required-status-checks rule so
#                     it gates merge whenever it runs. The job's
#                     `if: needs.detect-changes.outputs.contracts == 'true'`
#                     guard means it's only required on contracts-
#                     touching PRs; docs-only PRs see it skipped, and
#                     branch protection treats `if:`-skipped as SUCCESS.
#
#   workspaces        pnpm workspace typechecks (apps/keeper, apps/indexer
#                     — incl. the indexer's event-coverage script,
#                     apps/agent, apps/defi via `tsc -b --noEmit`,
#                     apps/www). The vitest test suites in apps/defi +
#                     apps/agent are NOT run here — pre-existing test-
#                     setup failures tracked as Issue #85; once that's
#                     resolved, `pnpm -r test` joins this workflow in a
#                     small follow-up PR.
#
# For the `Protect main` ruleset's required-status-checks rule, wire
# `contracts-fast`, `contracts-full`, `workspaces`, and `detect-changes`.
# `contracts-full` is conditionally required via the path-filter skip
# pattern: it's listed as required, but its `if:` guard skips it on
# docs-only PRs — and branch protection treats `if:`-skipped checks as
# SUCCESS, so docs-only PRs still merge fast. Contracts-touching PRs
# must wait for the full regression to complete on the FINAL commit
# before merge — closing the gap where a subtle regression could land
# on main between PR-time and the next mainnet-gate run.
#
# The release/* / `v*` tag-gated `mainnet-gate.yml` follow-up
# (tracked as 74.C) re-runs `predeploy-check.sh --full` as a hard gate
# before any cutover. Keep these job names stable, or update the
# ruleset in lockstep.
#
# Non-blocking workflows that also run on PRs:
#   - release-notes-drift.yml — warns if a behaviour change lacks a release
#     note or FunctionalSpecs update.
#   - add-to-project.yml — auto-cards new Issues onto @vaipakam-labs.
#
# Forge build is heavy (5–15 min cold per CLAUDE.md) — the job timeout is set
# generously and Foundry's own `cache/` + the `out/` artifact tree are
# cached across runs to keep warm-build times in the 1–2 min range.

name: ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    # Weekly safety scan — inherited from the retired codeql.yml. The
    # CodeQL pack itself updates between PRs, so a clean main can grow
    # new findings between scheduled scans even with no commits. Runs
    # the FULL ci.yml graph weekly (CodeQL + Slither + gas-snapshot +
    # forge build) — a small recurring cost in exchange for a safety
    # net that catches submodule drift, dep-bump-triggered failures,
    # and new CodeQL-pack rule classes between human-driven runs.
    - cron: '17 6 * * 1'   # Mondays 06:17 UTC (inherited slot)
  workflow_dispatch:

concurrency:
  # Per-ref serialisation — a new push to the same branch cancels the previous
  # in-flight run so we don't burn minutes verifying a commit that's already
  # been superseded.
  #
  # Concurrency group includes `${{ github.event_name }}` so the weekly
  # `schedule` run lives in its OWN group ("ci-refs/heads/main-schedule")
  # separate from the push-driven group ("ci-refs/heads/main-push"). That
  # prevents a routine push to main from cancelling the in-progress safety
  # scan — the scan is the only chance we have to catch CodeQL-pack drift,
  # submodule pin drift, and dep-bump-triggered failures between
  # commit-driven runs.
  #
  # `cancel-in-progress: true` only on PR events — push and schedule events
  # let prior runs finish (per Codex review on PR #160).
  group: ci-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read
  security-events: write   # SARIF uploads (Slither + CodeQL)
  actions: read            # required by github/codeql-action/analyze

jobs:
  # ── detect-changes ────────────────────────────────────────────────────
  # Lightweight first-pass job that runs on every PR (~30 s total). Diffs
  # the PR head against its base (or the push commit against HEAD~1) and
  # exports two boolean outputs:
  #
  #   contracts: any file under contracts/, `.gitmodules` (submodule
  #              URL / pin edit invalidates the cache key), or the ci /
  #              mainnet-gate workflows
  #   workspaces: any file under apps/ or packages/, the pnpm lockfile,
  #               pnpm-workspace.yaml (declares workspace members),
  #               root package.json, or the ci workflow
  #
  # Downstream jobs `if:`-guard on these outputs. When the guard is
  # false, GitHub Actions reports the job as "skipped" — and branch
  # protection treats skipped-due-to-`if` as a SUCCESS for required-
  # status-checks. So a PR that only touches docs/* (no contracts, no
  # workspaces) sees all three downstream jobs go skipped → ready-to-
  # merge without any workflow change burning ~25 min of forge build.
  #
  # NOT using `on.pull_request.paths:` at workflow level because that
  # makes GitHub skip the WHOLE workflow — the required-check status
  # never gets posted, and branch protection then blocks the merge
  # forever waiting for it.
  #
  # Defensive: `detect-changes` IS also in the required-status-checks
  # rule on `Protect main`. If detect-changes itself fails (checkout
  # timeout, network blip, runner exhaustion), the downstream jobs
  # would otherwise auto-skip via the `needs:` constraint — which
  # branch protection treats as SUCCESS. Without detect-changes in the
  # required-check set, a transient infra failure could let an
  # un-validated PR through the merge gate. Making it required closes
  # that hole: detect-changes failing turns red on the PR and blocks
  # merge directly. Operator investigates, re-runs, or amends.
  detect-changes:
    name: detect-changes
    runs-on: ubuntu-latest
    timeout-minutes: 3
    outputs:
      contracts: ${{ steps.diff.outputs.contracts }}
      workspaces: ${{ steps.diff.outputs.workspaces }}
    steps:
      - name: Checkout (shallow — diff range only)
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          # fetch-depth: 0 so git diff can resolve the PR base sha. The
          # rest of the workflow doesn't depend on full history.
          fetch-depth: 0

      - name: Determine changed paths
        id: diff
        run: |
          set -eu
          # `schedule` (weekly cron) and `workflow_dispatch` (manual)
          # events have no diff range — there's no PR-base to compare
          # against and no `before` SHA. Fall open: treat everything as
          # changed so the full graph runs. Weekly is the intended
          # safety-net behaviour (catches submodule drift, dep-bump-
          # triggered failures, new CodeQL-pack rules); manual dispatch
          # is the operator saying "run the full thing now anyway".
          if [ "${{ github.event_name }}" = "schedule" ] \
              || [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Schedule/manual trigger — treating everything as changed"
            echo "contracts=true" >> "$GITHUB_OUTPUT"
            echo "workspaces=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
            HEAD="${{ github.event.pull_request.head.sha }}"
          else
            # `push` event — diff the pushed commit against its parent.
            BASE="${{ github.event.before }}"
            HEAD="${{ github.sha }}"
            # On the very first commit to a branch `before` is all-zeros.
            # Fall back to comparing against HEAD~1.
            if [ "$BASE" = "0000000000000000000000000000000000000000" ]; then
              BASE=$(git rev-parse HEAD~1 2>/dev/null || git rev-parse HEAD)
            fi
          fi
          echo "Diff range: $BASE..$HEAD"
          CHANGED=$(git diff --name-only "$BASE" "$HEAD" || git diff --name-only HEAD~1 HEAD)
          echo "Changed files:"
          echo "$CHANGED"

          # Contracts-affecting paths: anything in contracts/, foundry
          # config in contracts/, the CI workflow itself (so a workflow
          # change DOES re-validate contracts), the mainnet-gate
          # workflow (audit-trail coherence), and `.gitmodules` — a
          # submodule URL / path edit is exactly the class of change
          # the content-based cache key invalidates on, so contracts
          # CI must re-run to confirm the rebuilt graph still passes.
          CONTRACTS_RE='^(contracts/|\.gitmodules$|\.github/workflows/(ci|mainnet-gate)\.yml$)'
          if echo "$CHANGED" | grep -Eq "$CONTRACTS_RE"; then
            echo "contracts=true" >> "$GITHUB_OUTPUT"
          else
            echo "contracts=false" >> "$GITHUB_OUTPUT"
          fi

          # Workspaces-affecting paths: anything under apps/ or packages/,
          # the lockfile + root package.json that govern hoisting, AND
          # `pnpm-workspace.yaml` — that file declares the workspace
          # member list, so a change there can add / drop a workspace
          # that the typecheck steps target.
          WORKSPACES_RE='^(apps/|packages/|pnpm-lock\.yaml|pnpm-workspace\.yaml|package\.json|\.github/workflows/ci\.yml$)'
          if echo "$CHANGED" | grep -Eq "$WORKSPACES_RE"; then
            echo "workspaces=true" >> "$GITHUB_OUTPUT"
          else
            echo "workspaces=false" >> "$GITHUB_OUTPUT"
          fi

  # ── analyze-jstypescript ──────────────────────────────────────────────
  # CodeQL static analysis on the TypeScript/JavaScript surface. Folded
  # into ci.yml in #158 so a CodeQL failure can short-circuit the
  # downstream forge build (`contracts-fast` now `needs:
  # analyze-jstypescript` too). Pre-fold this lived as its own
  # `codeql.yml` workflow file — and because GitHub Actions doesn't
  # support cross-workflow `needs:` dependencies, a CodeQL failure
  # could race the cold forge build in parallel.
  #
  # Runs on every PR — NOT gated on the workspaces path-filter. CodeQL
  # walks JS/TS at the repo level (root tsconfig, root scripts/, the
  # CodeQL config files in .github/codeql/ themselves), not just under
  # apps/* + packages/*. The original codeql.yml ran on every PR
  # unconditionally; this preserves that behaviour so a config-only or
  # root-script-only PR can't bypass the scan (per Codex review on
  # PR #160 — P1 and P2 findings).
  #
  # The `security-extended` query pack inherits from the original
  # codeql.yml — wider coverage at modest CI cost. Findings land on
  # the same Security → Code scanning surface Slither populates.
  #
  # INFORMATIONAL by default but listed in `contracts-fast` needs:,
  # so its FAILURE blocks the expensive forge build downstream even
  # though it's not in the Protect main required-status-checks rule.
  analyze-jstypescript:
    name: Analyze (javascript-typescript)
    needs: detect-changes
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      security-events: write   # SARIF → Code scanning
      actions: read            # required by github/codeql-action/analyze

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@78ed0c7291d93e40c51b085850dc669a4c3ab73b # v3
        with:
          languages: javascript-typescript
          # `security-extended` adds queries beyond the default set —
          # higher coverage at modest extra CI time. Acceptable for a
          # repo with one developer + paying full attention.
          queries: security-extended
          # `paths-ignore` covers vendored Solidity submodule tooling
          # (OZ Certora scripts, chainlink deploy scripts, etc.) —
          # same exclusion list as `contracts/slither.config.json`.
          config-file: ./.github/codeql/codeql-config.yml

      - name: Autobuild
        # For JS/TS, autobuild is a no-op (interpreted languages) but
        # the step is required by the analyze step.
        uses: github/codeql-action/autobuild@78ed0c7291d93e40c51b085850dc669a4c3ab73b # v3

      - name: Perform analysis
        uses: github/codeql-action/analyze@78ed0c7291d93e40c51b085850dc669a4c3ab73b # v3
        with:
          category: '/language:javascript-typescript'

  # Two contracts jobs, designed for different cost/coverage trade-offs.
  # Serialized — contracts-full runs AFTER contracts-fast so the full
  # regression rides on the warm foundry cache contracts-fast just saved,
  # rather than redoing the cold forge build itself:
  #
  #   detect-changes
  #     ↓
  #   contracts-fast (forge build + deploy-sanity, ~30-60 s warm /
  #                   ~5-15 min cold)                ← required gate
  #     ↓ (cache saved at job end → next job restores)
  #   contracts-full (warm-restore + full regression, ~5-10 min)
  #                                                  ← conditionally
  #                                                    required
  #
  #   contracts-fast  — `predeploy-check.sh` without `--full`. Runs the
  #                     deploy-sanity suite (`test/deploy/*` — 12 tests
  #                     covering EIP-170 facet sizes, selector coverage +
  #                     ownership, deploy integration) + ABI-in-sync check
  #                     + shell-script lint. Catches the deploy-blocker
  #                     regression classes (#66 / #71 / #72 / #75 + #69).
  #                     Wired into Protect main's required_status_checks
  #                     rule — the FAST gating contract check.
  #
  #   contracts-full  — `predeploy-check.sh --full`. Runs the full
  #                     regression (2,012 tests, no invariants). Matches
  #                     what `deploy-mainnet.sh --full` invokes at
  #                     preflight. CONDITIONALLY REQUIRED on PRs via the
  #                     path-filter skip pattern: listed in the Protect
  #                     main required_status_checks rule, but its
  #                     `if: needs.detect-changes.outputs.contracts ==
  #                     'true'` guard skips it on docs-only PRs.
  #                     Branch protection treats `if:`-skipped checks as
  #                     SUCCESS for required status, so docs-only PRs
  #                     still merge fast; contracts-touching PRs must
  #                     wait for it.
  #
  #                     `mainnet-gate.yml` re-runs --full as a separate
  #                     hard gate on release/* branches and v* tags —
  #                     the last line of defence before any cutover.
  #
  # Why serial (not parallel)? Parallel would mean TWO cold-cache forge
  # builds on a typical fresh PR — wasteful. The serial design reuses
  # contracts-fast's just-saved cache for contracts-full's restore,
  # halving the cold-cache compute footprint. Critical-path latency to
  # merge-ready grows by ~5-10 min on contracts-touching PRs (was
  # `contracts-fast` only, now `max(contracts-fast, contracts-full)`)
  # — the deliberate trade-off for ensuring the full regression ran on
  # the FINAL commit before merge.
  #
  # Cache-save / restore mechanics: `actions/cache` saves at job END
  # (post-action hook fires when the job finishes). A subsequent job in
  # the SAME workflow run can then restore that just-saved cache by key.
  # Both jobs share the identical content-based key; contracts-fast
  # populates it; contracts-full reads it.
  contracts-fast:
    name: contracts-fast (forge + predeploy-check)
    # Fail-fast ordering: gate the expensive forge build on the cheap
    # workspaces typecheck. If workspaces FAILS, there's no point
    # burning the cold forge build's ~10 min just to surface a second
    # red — contracts-fast skips, saving the compute. workspaces IS
    # in the Protect main required-status-checks rule, so its red
    # directly blocks merge; contracts-fast auto-skipping via the
    # `if:` does NOT bypass that gate.
    #
    # analyze-jstypescript is listed in `needs:` for the sequencing
    # — it must finish before contracts-fast starts so they don't
    # race for runner minutes — but is NOT in the `if:` condition.
    # Reason: analyze-jstypescript is NOT a required check on Protect
    # main. If we added `needs.analyze-jstypescript.result != 'failure'`
    # to the `if:`, then a CodeQL failure would auto-skip contracts-
    # fast — and branch protection treats "skipped" as SUCCESS for
    # required checks. The PR would be mergeable with NO forge build
    # ever run. So CodeQL failures DON'T save forge compute; that's
    # the safety-vs-compute trade-off (per Codex round-2 review on
    # PR #160 — P1 finding).
    #
    # The `!cancelled()` prefix lets the `if:` evaluate when a
    # `needs:` dep was SKIPPED — e.g. on a contracts-only PR where
    # the workspaces path-filter excluded it. Without `!cancelled()`,
    # a skipped need would auto-skip this job too.
    #
    # Trade-off (consistent with feedback_ci_compute_over_wall_clock):
    # wall-clock to merge-ready grows by ~max(workspaces,
    # analyze-jstypescript) — both run in parallel before contracts-fast
    # — in exchange for ~10 min of forge compute saved on workspaces-
    # fail PRs.
    needs: [detect-changes, workspaces, analyze-jstypescript]
    if: |
      !cancelled()
      && needs.detect-changes.outputs.contracts == 'true'
      && needs.workspaces.result != 'failure'
    runs-on: ubuntu-latest
    # Timeout reduced 45 → 15 min after #290 narrowed `contracts-fast`'s
    # scope. Under the `cifast` foundry profile this job now compiles
    # src/ + script/ + test/deploy/** + test/scenarios/** + test/mocks/**
    # + SetupTest + HelperTest (~310 files instead of the previous ~430)
    # and skips every non-positive top-level test file. Local cold-build
    # measurement: ~5:22 wall-clock + ~3.17 GB peak RSS — comfortably
    # under the 16 GB GitHub-hosted ubuntu-latest standard-runner ceiling
    # that was OOM-killing the pre-#290 full-scope build (~17.7 GB).
    timeout-minutes: 15
    # #290 — every forge invocation in this job runs under the
    # narrow-scope `cifast` profile defined in `contracts/foundry.toml`.
    # This is what reduces peak RSS from ~17.7 GB → ~3.2 GB and keeps
    # the OOM-shutdown failures we hit on PR #288 off the table.
    env:
      FOUNDRY_PROFILE: cifast
    defaults:
      run:
        working-directory: contracts

    steps:
      - name: Checkout (with submodules — chainlink-evm, OZ, diamond-3, etc.)
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@c7450ba673e133f5ee30098b3b54f444d3a2ca2d # v1
        with:
          version: stable

      # Foundry's `out/` (artifact tree) and `cache/` (incremental compile)
      # together cut a warm `forge build` from ~10 min to ~90 s.
      #
      # Cache key design — content-based, structured so `actions/cache`'s
      # PREFIX matching on `restore-keys` can actually fire:
      #
      #   key:          forge-OS-{configHash}-{sourceHash}
      #   restore-key:  forge-OS-{configHash}-          (literal prefix of key)
      #
      # configHash is hashFiles(foundry.toml, remappings.txt, .submodule-state)
      # — the inputs that change toolchain / lib version. sourceHash is
      # hashFiles(**.sol) — the inputs that change incremental output.
      # When sourceHash changes (a normal commit), the primary key misses but
      # the restore-key prefix matches the same-config cache, so Foundry
      # restores hot artifacts and incremental-compiles only the changed
      # files. When configHash changes (foundry version bump, submodule
      # bump, remappings edit), no restore matches — full rebuild expected.
      #
      # Codex review iterations on PR #84 walked us through four wrong
      # designs before this one:
      #   v1: hashFiles('contracts/lib/**/.git/HEAD')
      #       — no-op glob, submodule bumps never invalidated.
      #   v2: ${{ github.sha }} suffix
      #       — per-commit exact-key miss, action re-saves on every run,
      #       churns the 10 GB cache budget.
      #   v3: single hashFiles(...) covering everything, separate
      #       hashFiles(config) restore-key
      #       — restore-key was a different hash from the primary key, not
      #       a prefix of it; PREFIX MATCHING NEVER FIRED so warm builds
      #       across same-config / different-source commits silently cold-
      #       started anyway.
      #   v4 (this): structured concat so the restore-key is a literal
      #       prefix of the primary key.
      - name: Snapshot submodule SHAs (for content-based cache key)
        working-directory: contracts
        run: git submodule status --recursive > .submodule-state

      - name: Cache forge artifacts
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            contracts/out
            contracts/cache
          key: forge-${{ runner.os }}-${{ hashFiles('contracts/foundry.toml', 'contracts/remappings.txt', 'contracts/.submodule-state') }}-${{ hashFiles('contracts/src/**/*.sol', 'contracts/script/**/*.sol', 'contracts/test/**/*.sol') }}
          restore-keys: |
            forge-${{ runner.os }}-${{ hashFiles('contracts/foundry.toml', 'contracts/remappings.txt', 'contracts/.submodule-state') }}-

      # `predeploy-check.sh` without `--full` runs:
      #   - forge build
      #   - the deploy-sanity suite (`test/deploy/*` — 12 tests)
      #   - shell-script lint on deploy-*.sh
      #   - per-facet ABI-in-sync check
      # The deploy-sanity suite covers exactly the regression classes that
      # would block a deploy at `--broadcast` time (EIP-170 size, selector
      # coverage + ownership, deploy integration, ABI freshness). The full
      # 2,012-test regression runs in the contracts-full job below.
      - name: Pre-deploy check (deploy-sanity suite)
        run: bash script/predeploy-check.sh

  # ── contracts-full ─────────────────────────────────────────────────────
  # Informational. Runs the same predeploy-check.sh script with `--full`,
  # which swaps the deploy-sanity suite for the full
  # `forge test --no-match-path "test/invariants/*"` regression (2,012 tests).
  # Matches what `deploy-mainnet.sh --full` invokes at preflight step [1b].
  # NOT a required-status-check on the Protect main ruleset — surfaces a
  # red on the PR if any non-deploy-sanity test regresses, but does not
  # block merge. The release/* / v* tag-gated `mainnet-gate.yml` workflow
  # (tracked as a 74.C follow-up) will re-run this as a hard gate before
  # any cutover.
  contracts-full:
    name: contracts-full (forge + predeploy-check --full)
    # Issue #169 — three-branch parallel-warm fan-out after contracts-fast:
    #   contracts-fast → [build-docs || slither || (contracts-full → gas-snapshot)]
    #
    # Branch 3 (this job + gas-snapshot) runs in parallel with build-docs
    # and slither. The forge build itself happens ONCE in contracts-fast;
    # every job in the fan-out restores the warm `out/` + `cache/`
    # populated there. `forge test` here skips recompilation entirely
    # (28 s observed on PR #167 post-warm-restore).
    #
    # `gas-snapshot` chains off this job (`needs: contracts-full`) so the
    # gas-tolerance check runs only on a tests-pass state — a failed
    # regression makes gas numbers meaningless. If contracts-fast fails,
    # this job cascade-skips and gas-snapshot follows.
    needs: [detect-changes, contracts-fast]
    # #290 — this job ONLY runs on manual `workflow_dispatch` fire.
    # Full regression is structurally too heavy for GitHub-hosted
    # `ubuntu-latest` standard runners (peak ~17.7 GB RSS vs 16 GB
    # ceiling — OOM-shutdown root cause for PR #288). Operators run
    # the full regression LOCALLY at end-of-step (see CLAUDE.md
    # "Executing forge" + memory `feedback_no_local_forge_builds.md`),
    # and manually fire this workflow before mainnet-rollout PRs via
    # the Actions tab. The default profile (test + script + invariants)
    # is unchanged here.
    if: |
      github.event_name == 'workflow_dispatch'
      && needs.detect-changes.outputs.contracts == 'true'
      && needs.contracts-fast.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    defaults:
      run:
        working-directory: contracts

    steps:
      - name: Checkout (with submodules — chainlink-evm, OZ, diamond-3, etc.)
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@c7450ba673e133f5ee30098b3b54f444d3a2ca2d # v1
        with:
          version: stable

      - name: Snapshot submodule SHAs (for content-based cache key)
        working-directory: contracts
        run: git submodule status --recursive > .submodule-state

      # Same cache key as contracts-fast. Within a single workflow run the
      # two jobs DO NOT share a warm cache — `actions/cache` only restores
      # from caches saved by PRIOR runs (the save happens at job end). The
      # benefit of identical keys is across runs: when this run's
      # contracts-full saves a cache, the NEXT run's contracts-fast and
      # contracts-full both restore from it. So both jobs hit a cold
      # restore on the very first run after a config / submodule / .sol
      # change, but converge on warm hits on every subsequent run.
      - name: Cache forge artifacts
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            contracts/out
            contracts/cache
          key: forge-${{ runner.os }}-${{ hashFiles('contracts/foundry.toml', 'contracts/remappings.txt', 'contracts/.submodule-state') }}-${{ hashFiles('contracts/src/**/*.sol', 'contracts/script/**/*.sol', 'contracts/test/**/*.sol') }}
          restore-keys: |
            forge-${{ runner.os }}-${{ hashFiles('contracts/foundry.toml', 'contracts/remappings.txt', 'contracts/.submodule-state') }}-

      - name: Pre-deploy check (full regression)
        run: bash script/predeploy-check.sh --full

  # ── gas-snapshot ───────────────────────────────────────────────────────
  # Folded into ci.yml so it serializes after contracts-fast — that
  # way it ALWAYS hits a warm foundry cache (contracts-fast just saved
  # it in this same workflow run, AND the shared content-keyed cache
  # hits across runs too). Previously this was a standalone
  # `gas-snapshot.yml` workflow that triggered in parallel with ci.yml
  # on `pull_request` — meaning two cold-cache `forge build`s would
  # race on every fresh PR. The per-PR compute-unit cost is the
  # priority (see feedback_ci_compute_over_wall_clock in agent
  # memory); wall-clock to the gas-snapshot result on a cold-cache PR
  # is now ~5-10 min later, but the wall-clock to merge-ready
  # (contracts-fast — the gating check) is UNCHANGED.
  #
  # INFORMATIONAL — not in the Protect main required-status-checks
  # rule. A gas regression surfaces as a red on this job but doesn't
  # gate merge.
  gas-snapshot:
    name: Gas snapshot diff
    # Issue #169 — last link in the strict-serial chain:
    #   contracts-fast → [build-docs || slither] → contracts-full → gas-snapshot
    # Runs after `contracts-full` to ensure the full regression passed
    # before bothering with the gas-tolerance check. If contracts-full
    # cascade-skipped (build-docs / slither / contracts-fast upstream
    # failure), this job cascade-skips too.
    needs: [detect-changes, contracts-full]
    if: |
      needs.detect-changes.outputs.contracts == 'true'
      && needs.contracts-full.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      pull-requests: write   # for the gas-diff sticky comment
    defaults:
      run:
        working-directory: contracts

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@c7450ba673e133f5ee30098b3b54f444d3a2ca2d # v1
        with:
          version: stable

      - name: Snapshot submodule SHAs (for content-based cache key)
        run: git submodule status --recursive > .submodule-state

      # Same cache key shape as contracts-fast + contracts-full. The
      # cache is saved by contracts-fast at its job end; this job
      # restores it on start, so the inevitable `forge build` inside
      # `forge snapshot` hits warm artifacts and skips re-compilation.
      - name: Restore forge artifacts (warm from contracts-fast)
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            contracts/out
            contracts/cache
          key: forge-${{ runner.os }}-${{ hashFiles('contracts/foundry.toml', 'contracts/remappings.txt', 'contracts/.submodule-state') }}-${{ hashFiles('contracts/src/**/*.sol', 'contracts/script/**/*.sol', 'contracts/test/**/*.sol') }}
          restore-keys: |
            forge-${{ runner.os }}-${{ hashFiles('contracts/foundry.toml', 'contracts/remappings.txt', 'contracts/.submodule-state') }}-

      - name: Forge snapshot --check (5% tolerance)
        # `--tolerance` is a percentage (0-100), not basis points.
        # 5 = 5%. Any test whose gas increases by more than 5% from
        # the committed baseline fails the run.
        #
        # `--no-match-path "test/invariants/*"` matches local
        # convention for snapshot generation; invariant tests run a
        # randomised harness whose gas is non-deterministic.
        #
        # `--no-match-test '(_Sanctions_...|test...CountriesNotCompatible|test...BlocksSanctionedCountries|test_borrowerAmountMaxZeroDerivation)'`
        # skips early-revert / vm.skip tests that report `(gas: 0)`.
        # forge's tolerance math divides by the expected gas; when
        # that's zero any consumed value (even another zero) triggers
        # a false "Diff" failure. The regex must match the same set
        # used at snapshot generation time.
        #
        # `test_borrowerAmountMaxZeroDerivation` is the #173 permanent
        # `vm.skip(true, ...)` documenting the deleted derivation path
        # from #183 — also reports gas: 0, also needs to be off the
        # tolerance-check list.
        #
        # NOTE: local development prefixes forge with
        # `nice -n -10 ionice -c 2 -n 0` for priority on a shared
        # workstation. GitHub-hosted runners deny `CAP_SYS_NICE` so the
        # prefix would error here — dropped from the CI step.
        run: |
          forge snapshot --check --tolerance 5 \
            --no-match-path "test/invariants/*" \
            --no-match-test '(_Sanctions_(AcceptOffer|SellLoan|TransferObligation)_Blocked|testSellLoanRevertsCountriesNotCompatible|testAcceptOfferBlocksSanctionedCountries|test_borrowerAmountMaxZeroDerivation)'

      - name: Diff hint on failure
        # When the check fails (gas regression), drop a one-line
        # remediation guide into the job summary so the contributor
        # knows what to run locally to update the baseline.
        if: failure()
        run: |
          {
            echo "## ⛽ Gas regression detected"
            echo ""
            echo "One or more tests exceed the +5% gas tolerance vs"
            echo "the committed \`contracts/.gas-snapshot\`."
            echo ""
            echo "Options:"
            echo "1. **Reduce the gas** — investigate the regressing test(s) and"
            echo "   identify the source. Often an accidental O(n) where O(1)"
            echo "   was expected, or a redundant storage write."
            echo "2. **Accept the regression** (legitimate cost of a new feature):"
            echo "   regenerate the snapshot locally and commit:"
            echo "   \`\`\`bash"
            echo "   cd contracts && nice -n -10 ionice -c 2 -n 0 forge snapshot \\"
            echo "     --no-match-path \"test/invariants/*\" \\"
            echo "     --no-match-test '(_Sanctions_(AcceptOffer|SellLoan|TransferObligation)_Blocked|testSellLoanRevertsCountriesNotCompatible|testAcceptOfferBlocksSanctionedCountries|test_borrowerAmountMaxZeroDerivation)'"
            echo "   git add contracts/.gas-snapshot"
            echo "   \`\`\`"
            echo ""
            echo "See \`docs/internal/ProjectProcedures.md\` for the snapshot convention."
          } >> "$GITHUB_STEP_SUMMARY"

  # ── slither ────────────────────────────────────────────────────────────
  # Folded into ci.yml so it shares the SAME foundry build that
  # contracts-fast warmed — previously this ran via the
  # `crytic/slither-action` Docker container that did its own forge
  # build inside the container, invisible to and unshareable with the
  # host-runner cache. That meant every contracts-touching PR cold-
  # built forge TWICE: once for ci.yml, once for slither.
  #
  # The crytic action wrapped three things (slither install, slither
  # run, SARIF emission); each is a one-liner on the host runner:
  #   - `pip install slither-analyzer==0.11.4`
  #   - `slither contracts/ --config-file contracts/slither.config.json
  #     --sarif contracts/slither-results.sarif`
  #   - `github/codeql-action/upload-sarif` (already used by the old
  #     slither.yml)
  #
  # 0.11.5+ requires Python ≥3.10; the action's docker image carried
  # an older Python, so the comment in old slither.yml pinned 0.11.4.
  # GitHub-hosted runners ship Python 3.10+ today so this constraint
  # would relax — keep the pin anyway for report-stability across
  # runs. Revisit when slither's own release cadence shifts.
  #
  # INFORMATIONAL — `fail-on: none` equivalent here is just not
  # propagating slither's exit code. The script captures slither's
  # return value but the step always succeeds; the SARIF upload
  # populates the security/code-scanning surface either way.
  slither:
    name: Slither static analysis
    needs: [detect-changes, contracts-fast]
    if: |
      needs.detect-changes.outputs.contracts == 'true'
      && needs.contracts-fast.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      security-events: write   # SARIF upload to code-scanning surface
    defaults:
      run:
        working-directory: contracts

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@c7450ba673e133f5ee30098b3b54f444d3a2ca2d # v1
        with:
          version: stable

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.10'

      - name: Snapshot submodule SHAs (for content-based cache key)
        run: git submodule status --recursive > .submodule-state

      # Same cache key shape as contracts-fast + contracts-full +
      # gas-snapshot. contracts-fast saved this at its job end; this
      # job restores it, so slither's forge build hits warm artifacts.
      - name: Restore forge artifacts (warm from contracts-fast)
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            contracts/out
            contracts/cache
          key: forge-${{ runner.os }}-${{ hashFiles('contracts/foundry.toml', 'contracts/remappings.txt', 'contracts/.submodule-state') }}-${{ hashFiles('contracts/src/**/*.sol', 'contracts/script/**/*.sol', 'contracts/test/**/*.sol') }}
          restore-keys: |
            forge-${{ runner.os }}-${{ hashFiles('contracts/foundry.toml', 'contracts/remappings.txt', 'contracts/.submodule-state') }}-

      - name: Install slither-analyzer
        # 0.11.4 pin matches the old slither.yml — keeps detector
        # output stable across runs even when 0.11.5+ ships new rules.
        run: pip install slither-analyzer==0.11.4

      - name: Run Slither
        # Slither auto-detects the Foundry project layout and re-uses
        # the restored `out/` + `cache/` (skipping its own forge build
        # when those are warm). `--sarif` emits SARIF directly — no
        # need for the crytic action's wrapper. `|| true` matches the
        # old workflow's `fail-on: none` semantics; the SARIF upload
        # is the real product, not the exit code.
        run: |
          slither . \
            --config-file slither.config.json \
            --sarif slither-results.sarif \
            || true

      - name: Upload Slither SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@78ed0c7291d93e40c51b085850dc669a4c3ab73b # v3
        with:
          sarif_file: contracts/slither-results.sarif

  # ── Build docs ─────────────────────────────────────────────────────────
  # Folded in from `contracts-docs.yml` (Issue #169). Previously a
  # separate workflow that triggered on the same `pull_request` event as
  # ci.yml, running its own cold forge build in parallel with
  # `contracts-fast` — two ~22 min compiles per contracts-touching PR.
  # GitHub Actions doesn't support cross-workflow `needs:` dependencies,
  # so the only way to eliminate the racing cold compiles was to fold
  # the docs build into the same workflow.
  #
  # Now downstream of `contracts-fast`: this job restores the same
  # `actions/cache` artifacts and runs `forge doc --build` against warm
  # contracts. One forge cold compile per PR, period — `contracts-fast`
  # is the chokepoint, every other forge-USE job (contracts-full,
  # slither, gas-snapshot, build-docs) consumes its warm cache.
  #
  # The Pages-deploy step stays in `contracts-docs.yml` (narrowed to
  # push-to-main + workflow_dispatch only). PR-preview artifact upload
  # lives HERE so reviewers can download + inspect the rendered docs
  # before merge, and the build step is part of the same path-gated
  # serial chain as the rest of the contracts CI.
  build-docs:
    name: Build docs
    needs: [detect-changes, contracts-fast]
    if: |
      needs.detect-changes.outputs.contracts == 'true'
      && needs.contracts-fast.result == 'success'
    runs-on: ubuntu-latest
    # `forge doc --build` only reads src/ NatSpec — it doesn't need test/
    # at all. Pre-#290 it inherited the default profile, so a cache miss
    # on any test file triggered a full-scope re-compile (which is what
    # timed this job out under #295's narrowed `contracts-fast` cache).
    # Running under FOUNDRY_PROFILE=cifast aligns this job's compile
    # graph with contracts-fast's cache, so a warm restore is now a
    # no-op compile + just the NatSpec → mdbook rendering step (~3-5 min).
    timeout-minutes: 15
    env:
      FOUNDRY_PROFILE: cifast
    defaults:
      run:
        working-directory: contracts

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@c7450ba673e133f5ee30098b3b54f444d3a2ca2d # v1
        with:
          version: stable

      - name: Snapshot submodule SHAs (for content-based cache key)
        run: git submodule status --recursive > .submodule-state

      # Same cache key shape as contracts-fast + contracts-full +
      # gas-snapshot + slither. contracts-fast saved this at its job
      # end; this job restores it, so the `forge doc --build` step
      # below hits warm artifacts and skips re-compilation entirely
      # (only the NatSpec → mdbook rendering runs).
      - name: Restore forge artifacts (warm from contracts-fast)
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            contracts/out
            contracts/cache
          key: forge-${{ runner.os }}-${{ hashFiles('contracts/foundry.toml', 'contracts/remappings.txt', 'contracts/.submodule-state') }}-${{ hashFiles('contracts/src/**/*.sol', 'contracts/script/**/*.sol', 'contracts/test/**/*.sol') }}
          restore-keys: |
            forge-${{ runner.os }}-${{ hashFiles('contracts/foundry.toml', 'contracts/remappings.txt', 'contracts/.submodule-state') }}-

      - name: Forge doc --build
        # Builds an mdbook tree under `contracts/docs/book` from the
        # per-function NatSpec comments in `contracts/src/`. Output is
        # governed by `foundry.toml [doc]`.
        run: forge doc --build

      - name: Inject site root breadcrumb
        # Drop a tiny landing breadcrumb so visitors hitting the docs
        # site root understand what they're looking at. Mirrors the
        # version in contracts-docs.yml so the PR-preview artifact
        # shape is bit-identical to the production Pages site.
        run: |
          set -euo pipefail
          if [[ ! -d docs/book ]]; then
            echo "::error::forge doc did not produce contracts/docs/book"
            ls -la docs/ 2>/dev/null || true
            exit 1
          fi
          cat > docs/book/CONTEXT.md <<'EOF'
          # Vaipakam Contracts — auto-generated API docs
          Generated by `forge doc` from per-function NatSpec.
          For protocol-level docs, read:
          - [Repository root](https://github.com/vaipakam/vaipakam)
          - [Operator handbook](https://github.com/vaipakam/vaipakam/blob/main/docs/internal/ProjectProcedures.md)
          - [Architecture Decision Records](https://github.com/vaipakam/vaipakam/tree/main/docs/adr)
          - [Glossary](https://github.com/vaipakam/vaipakam/blob/main/docs/GLOSSARY.md)
          - [Functional specs](https://github.com/vaipakam/vaipakam/tree/main/docs/FunctionalSpecs)
          EOF

      - name: Upload PR-preview artifact
        # Always uploads the artifact for the PR (whatever the event
        # name) so reviewers can fetch + inspect the rendered docs
        # before merge. Pages deploy is handled separately by
        # contracts-docs.yml on push-to-main.
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: contracts-docs-pr-${{ github.event.pull_request.number }}
          path: contracts/docs/book
          retention-days: 7

  workspaces:
    name: workspaces (pnpm typecheck)
    needs: detect-changes
    if: needs.detect-changes.outputs.workspaces == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          # The release-notes-drift check reads git history; submodules not
          # needed for the TS side, so skip them to save ~30 s clone time.
          fetch-depth: 1

      # pnpm action handles `packageManager: "pnpm@10.4.1"` from package.json,
      # so we don't pin a version here — it auto-picks the corepack-declared one.
      - name: Install pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          # CLAUDE.md / `apps/agent/package.json` requires Node ≥22 for the
          # native `--experimental-strip-types` TS execution path. CI uses 22
          # LTS to match what the keeper-bot CI also pins to.
          node-version: '22'
          cache: 'pnpm'

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      # Per-workspace typecheck steps, ONE STEP PER WORKSPACE, instead of
      # `pnpm -r typecheck`. The fan-out version silently passes if a
      # workspace removes its `typecheck` script — a workspace whose
      # typecheck script is deleted (intentionally or by accident) would
      # still let CI go green. Listing each workspace explicitly forces a
      # red CI on that scenario (the step errors with "command not found"
      # rather than silently no-opping).
      #
      # `apps/defi` typechecks via `tsc -b --noEmit` directly because its
      # workspace doesn't declare a `typecheck` script (the type-check is
      # bundled into the `build` script's `tsc -b && vite build`). We avoid
      # the full build to keep CI fast — `--noEmit` is the structural-only
      # half of the build and is what matters for "did the types break".
      - name: Typecheck — apps/keeper
        run: pnpm --filter @vaipakam/keeper typecheck

      - name: Typecheck — apps/indexer (incl. check-event-coverage)
        run: pnpm --filter @vaipakam/indexer typecheck

      - name: Typecheck — apps/agent
        run: pnpm --filter @vaipakam/agent typecheck

      - name: Typecheck — apps/defi (tsc -b --noEmit)
        run: pnpm --filter @vaipakam/defi exec tsc -b --noEmit

      - name: Typecheck — apps/www
        run: pnpm --filter @vaipakam/www typecheck

      # `pnpm -r test` (the vitest suites in apps/defi and apps/agent) is
      # intentionally NOT wired into this required-check workflow. apps/defi
      # has pre-existing test-setup failures (Issue #85 — PublicDashboard +
      # LoanDetails tests need a ChainProvider wrap that no longer matches
      # the current context module) that are unrelated to anything CI is
      # gating against. Adding the vitest step would have shipped a red CI on
      # day one. Tracked separately; once #85 is fixed, add the
      # `pnpm -r test` step back here in a follow-up PR.
