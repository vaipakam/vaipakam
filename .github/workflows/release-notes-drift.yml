# Docs-drift check — release notes + functional specs.
#
# Non-blocking backstop for two per-PR documentation conventions:
#   - the release-note fragment  (docs/ReleaseNotes/unreleased/)
#   - the functional-spec update (docs/FunctionalSpecs/)
#
# On every push to main, if the merge changed contracts or app code but
# touched neither doc family, emit a warning + job-summary note so the
# gap is visible in the Actions tab. It never fails the run — these are
# disciplines, not merge gates.
#
# (Filename kept as release-notes-drift.yml for stable references; the
# check now covers functional specs too.)
name: Docs-drift check (release notes + functional specs)

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Check for release-note + functional-spec updates
        env:
          BEFORE: ${{ github.event.before }}
          AFTER: ${{ github.sha }}
        run: |
          set -euo pipefail

          # Resolve the diff base. `github.event.before` is all-zeros on a
          # branch's first push / unrelated history — fall back to HEAD^.
          if [ -z "${BEFORE:-}" ] || [ "$BEFORE" = "0000000000000000000000000000000000000000" ] \
             || ! git cat-file -e "$BEFORE^{commit}" 2>/dev/null; then
            BEFORE="$(git rev-parse HEAD^ 2>/dev/null || echo '')"
          fi
          if [ -z "$BEFORE" ]; then
            echo "No diff base — skipping drift check."
            exit 0
          fi

          changed="$(git diff --name-only "$BEFORE" "$AFTER")"
          work="$(printf '%s\n' "$changed" | grep -E '^(contracts/src/|apps/)' || true)"
          notes="$(printf '%s\n' "$changed" | grep -E '^docs/ReleaseNotes/' || true)"
          specs="$(printf '%s\n' "$changed" | grep -E '^docs/FunctionalSpecs/' || true)"

          ok=1

          if [ -n "$work" ] && [ -z "$notes" ]; then
            ok=0
            echo "::warning title=Release-notes drift::This merge changed contracts/ or apps/ but added no docs/ReleaseNotes/ fragment. Add one under docs/ReleaseNotes/unreleased/ per the fragment convention."
            {
              echo "### ⚠️ Release-notes drift"
              echo ""
              echo "This merge touched \`contracts/src/\` or \`apps/\` but added no"
              echo "\`docs/ReleaseNotes/\` change. Add a release-note fragment under"
              echo "\`docs/ReleaseNotes/unreleased/\` — see that directory's README."
            } >> "$GITHUB_STEP_SUMMARY"
          fi

          if [ -n "$work" ] && [ -z "$specs" ]; then
            ok=0
            echo "::warning title=Functional-specs drift::This merge changed contracts/ or apps/ but touched no docs/FunctionalSpecs/ doc. Update the relevant domain spec to the new behaviour — see docs/FunctionalSpecs/README.md."
            {
              echo "### ⚠️ Functional-specs drift"
              echo ""
              echo "This merge touched \`contracts/src/\` or \`apps/\` but updated no"
              echo "\`docs/FunctionalSpecs/\` doc. Rewrite the affected domain spec to"
              echo "the new current-state behaviour — see \`docs/FunctionalSpecs/README.md\`."
            } >> "$GITHUB_STEP_SUMMARY"
          fi

          if [ "$ok" = 1 ]; then
            echo "Docs-drift check OK." >> "$GITHUB_STEP_SUMMARY"
          fi
