# defi vitest — non-blocking drift-warn lane (#1076).
#
# The apps/defi unit suite rotted to 256 failures unnoticed because no
# CI job ever ran it (only typecheck). This lane runs it on every PR
# that touches defi (or the shared packages it consumes) and reports
# the pass/fail counts, but NEVER blocks the merge — a discipline, not
# a gate, same posture as the alpha02 coverage-drift check. The suite
# is mid-repair (#1076); once it is fully green, flip `continue-on-error`
# off (and add it to required checks) to make it a real gate.
name: defi vitest (non-blocking)

on:
  pull_request:
    paths:
      - 'apps/defi/**'
      - 'packages/lib/**'
      - 'packages/contracts/**'
      - 'packages/ui/**'
      - '.github/workflows/defi-vitest.yml'
  push:
    branches: [main]
    paths:
      - 'apps/defi/**'
      - 'packages/lib/**'
      - 'packages/contracts/**'
      - 'packages/ui/**'

permissions:
  contents: read

# One run per ref; a new push cancels the previous.
concurrency:
  group: defi-vitest-${{ github.ref }}
  cancel-in-progress: true

jobs:
  vitest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      # Non-blocking: the step records its own outcome and we surface a
      # warning + summary, but the job stays green so a mid-repair suite
      # (or a fresh regression) never blocks unrelated PRs.
      - name: Run defi vitest
        id: vitest
        continue-on-error: true
        run: pnpm --filter @vaipakam/defi test

      - name: Report outcome
        if: always()
        env:
          OUTCOME: ${{ steps.vitest.outcome }}
        run: |
          set -euo pipefail
          if [ "$OUTCOME" = "success" ]; then
            echo "defi vitest passed." | tee -a "$GITHUB_STEP_SUMMARY"
          else
            MSG="defi vitest reported failures (see the 'Run defi vitest' step log). Non-blocking while the #1076 suite repair is in progress — do not ignore a NEW regression your change introduced."
            echo "::warning::$MSG"
            {
              echo "## defi vitest (non-blocking)"
              echo ""
              echo "$MSG"
            } >> "$GITHUB_STEP_SUMMARY"
          fi
