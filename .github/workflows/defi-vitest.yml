# defi vitest — blocking gate (#1076).
#
# The apps/defi unit suite rotted to 256 failures unnoticed because no
# CI job ever ran it (only typecheck). It was repaired under #1076 and
# ran as a non-blocking drift-warn lane while it stabilised. Now that the
# suite is fully green it is a REAL gate: this job fails (and blocks the
# merge, once listed as a required check in branch protection) if any
# defi unit test fails. Add `defi vitest / vitest` to the branch's
# required status checks to enforce it on merge.
name: defi vitest

on:
  pull_request:
    paths:
      - 'apps/defi/**'
      - 'packages/lib/**'
      - 'packages/contracts/**'
      - 'packages/ui/**'
      # Root dependency / workspace inputs: a Vitest/jsdom/React/wagmi bump
      # here can break the suite without touching app/package source, so the
      # gate must fire on these too (Codex #1088 r2).
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - '.github/workflows/defi-vitest.yml'
  push:
    branches: [main]
    paths:
      - 'apps/defi/**'
      - 'packages/lib/**'
      - 'packages/contracts/**'
      - 'packages/ui/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'

permissions:
  contents: read

# One run per ref; a new push cancels the previous.
concurrency:
  group: defi-vitest-${{ github.ref }}
  cancel-in-progress: true

jobs:
  vitest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      # Blocking: a failing defi unit test fails this job. The suite is
      # deterministic and green on main (#1076), so a red run means a real
      # regression the change introduced — fix it, don't ignore it.
      - name: Run defi vitest
        run: pnpm --filter @vaipakam/defi test
