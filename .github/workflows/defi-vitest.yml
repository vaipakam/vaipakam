# defi vitest — blocking gate (#1076).
#
# The apps/defi unit suite rotted to 256 failures unnoticed because no
# CI job ever ran it (only typecheck). It was repaired under #1076 and
# now runs as a REAL gate: the `vitest` job fails (and blocks the merge,
# once listed as a required check in branch protection) if any defi unit
# test fails.
#
# The job also runs the shared @vaipakam/lib unit suite (#1099) — the
# workflow name stays `defi vitest` so the existing required-check wiring
# in branch protection keeps resolving; see the `vitest` job for the
# rationale on gating both suites together.
#
# Required-check shape (Codex #1098): this workflow runs on EVERY PR to
# main — it is NOT scoped with `on.pull_request.paths`. A workflow that
# never triggers (because its `paths` filter didn't match) produces NO
# check run at all, so a required status check keyed to it sits PENDING
# forever and blocks the merge of every PR that doesn't touch those
# paths. Instead the scoping lives on the `vitest` JOB via a
# `detect-changes` `if:` guard: when apps/defi (and the packages it
# imports) are untouched, `vitest` is `if:`-skipped, which branch
# protection treats as SUCCESS — the same pattern ci.yml uses for its
# conditionally-required jobs. Wire `defi vitest / vitest` (and, as the
# defensive backstop ci.yml documents, `defi vitest / detect-changes`)
# into the branch's required status checks.
name: defi vitest

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

# One run per ref; a new push cancels the previous.
concurrency:
  group: defi-vitest-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── detect-changes ──────────────────────────────────────────────────────
  # Emits a single boolean output (`defi`) — true when this PR touches
  # apps/defi, the packages it imports, or the workspace/lockfile inputs
  # that can break the suite without touching app source. Always runs and
  # always reports a conclusion, so the downstream `if:` guard resolves to
  # SUCCESS (skipped) rather than leaving a required check pending.
  detect-changes:
    name: detect-changes
    runs-on: ubuntu-latest
    timeout-minutes: 3
    outputs:
      defi: ${{ steps.diff.outputs.defi }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          # Full history so git diff can resolve the PR base sha.
          fetch-depth: 0

      - name: Determine changed paths
        id: diff
        run: |
          set -eu
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
            HEAD="${{ github.event.pull_request.head.sha }}"
          else
            # `push` event — diff the pushed commit against its parent.
            BASE="${{ github.event.before }}"
            HEAD="${{ github.sha }}"
            # First commit on a branch → `before` is all-zeros; fall back.
            if [ "$BASE" = "0000000000000000000000000000000000000000" ]; then
              BASE=$(git rev-parse HEAD~1 2>/dev/null || git rev-parse HEAD)
            fi
          fi
          echo "Diff range: $BASE..$HEAD"
          CHANGED=$(git diff --name-only "$BASE" "$HEAD" || git diff --name-only HEAD~1 HEAD)
          echo "Changed files:"
          echo "$CHANGED"

          # apps/defi source + the packages it imports (a lib/contracts/ui
          # change can break the suite), plus the root dependency /
          # workspace inputs a Vitest/jsdom/React/wagmi bump rides in on,
          # plus this workflow file itself.
          DEFI_RE='^(apps/defi/|packages/(lib|contracts|ui)/|package\.json$|pnpm-lock\.yaml$|pnpm-workspace\.yaml$|\.github/workflows/defi-vitest\.yml$)'
          if echo "$CHANGED" | grep -Eq "$DEFI_RE"; then
            echo "defi=true" >> "$GITHUB_OUTPUT"
          else
            echo "defi=false" >> "$GITHUB_OUTPUT"
          fi

  vitest:
    name: vitest
    needs: detect-changes
    if: needs.detect-changes.outputs.defi == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      # Blocking: a failing unit test fails this job. Both suites are
      # deterministic and green on main (#1076, #1099), so a red run means a
      # real regression the change introduced — fix it, don't ignore it.
      #
      # The shared @vaipakam/lib suite (#1099: multicall + chainPlatforms)
      # runs in the SAME job: `detect-changes` already flags a packages/lib
      # edit as `defi=true`, and a lib regression breaks apps/defi (its
      # primary consumer), so the two suites gate together rather than in a
      # second workflow.
      - name: Run @vaipakam/lib vitest
        run: pnpm --filter @vaipakam/lib test

      - name: Run defi vitest
        run: pnpm --filter @vaipakam/defi test
