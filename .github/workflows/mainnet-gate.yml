# Mainnet gate — hard-gate workflow that runs the FULL forge regression
# as a required check before any release-track commit can ship to mainnet.
#
# Why this exists: the routine PR CI (ci.yml) runs only the narrow
# deploy-sanity + positive-flow surface (`contracts-fast` under the
# `cifast` foundry profile) as a required check on every CONTRACTS-
# touching PR. The full 2,012-test regression is deliberately NOT in
# per-PR CI (its ~17.7 GB cold-build RSS overruns the 16 GB
# ubuntu-latest ceiling — see #296 / ADR-0006). Full regression is an
# operator-local responsibility at end-of-step + mainnet preflight.
#
# This workflow is the release-track full-regression gate — it runs
# `predeploy-check.sh --full` on the same `ubuntu-latest` runner,
# under the default foundry profile, bit-identical to what
# `deploy-mainnet.sh` invokes at preflight step [1b]. So a force-push
# between PR merge and tag, or any drift between the operator's
# local box and the artifact lineage being shipped, is caught
# before deploy.
#
# Runner-ceiling caveat (per ADR-0011, 2026-05-27): the default-
# profile full forge regression on the current test corpus peaks at
# ~17.7 GB RSS, over the 16 GB `ubuntu-latest` ceiling. The narrow
# `release/**` + `v*` trigger set means this workflow has NOT yet
# been exercised on the current corpus — no release-track refs
# exist yet on this repo. Before the FIRST push to a `release/**`
# branch or the first `v*` tag, the operator must either:
#   (a) confirm `predeploy-check.sh --full` fits on `ubuntu-latest`
#       for that release commit's corpus (re-measure with `/usr/bin/
#       time -v forge test --no-match-path "test/invariants/*"`), or
#   (b) move this workflow to a self-hosted runner / a different
#       scheduled path.
# Discovering the OOM gap at cutover would be expensive; documenting
# the gap here keeps the operator's pre-cutover checklist honest.
#
# This workflow is the safety net at the line that matters: before a
# release-track commit hits any deployable branch / tag, the full
# regression MUST pass. Triggers:
#
#   - push to `release/*` branches (e.g. `release/v0.1.0`, `release/sepolia`)
#   - push of a `v*` tag (the mainnet-deploy artifact lineage)
#
# Each trigger runs `bash contracts/script/predeploy-check.sh --full` —
# bit-identical to what `deploy-mainnet.sh` invokes at preflight step [1b].
# So a mainnet cutover that follows the release-train can't ship a state
# the deploy script would reject.
#
# Required-status-check enforcement: when a release/* branch is created
# or a v* tag is pushed, this workflow runs. To gate merges INTO
# release/* branches, add a separate ruleset (similar to `Protect main`)
# scoped to refs/heads/release/* with `mainnet-gate-full` as a required
# context. The default `Protect main` ruleset does NOT require this
# workflow — it stays scoped to the release track on purpose.

name: mainnet-gate

on:
  push:
    branches:
      - 'release/**'
    tags:
      - 'v*'
  pull_request:
    branches:
      - 'release/**'
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for the manual run (audit prep, hot patch, etc.)'
        required: false
        default: ''

concurrency:
  # Per-ref serialisation — a new push to the same release/* branch
  # cancels the older in-flight run.
  group: mainnet-gate-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  mainnet-gate-full:
    name: mainnet-gate-full (forge + predeploy-check --full)
    runs-on: ubuntu-latest
    # The full regression is the long pole; budget generously. Local
    # cold runs hit ~10-15 min on CLAUDE.md's reference hardware.
    timeout-minutes: 45
    defaults:
      run:
        working-directory: contracts

    steps:
      - name: Checkout (with submodules — chainlink-evm, OZ, diamond-3, etc.)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@c7450ba673e133f5ee30098b3b54f444d3a2ca2d # v1
        with:
          version: stable

      # Same content-based cache key as `ci.yml` — release branches share
      # the same artifact lineage as main branches, so warm hits from
      # ci.yml runs benefit this workflow too (and vice versa).
      - name: Snapshot submodule SHAs (for content-based cache key)
        working-directory: contracts
        run: git submodule status --recursive > .submodule-state

      - name: Cache forge artifacts
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            contracts/out
            contracts/cache
          key: forge-${{ runner.os }}-${{ hashFiles('contracts/foundry.toml', 'contracts/remappings.txt', 'contracts/.submodule-state') }}-${{ hashFiles('contracts/src/**/*.sol', 'contracts/script/**/*.sol', 'contracts/test/**/*.sol') }}
          restore-keys: |
            forge-${{ runner.os }}-${{ hashFiles('contracts/foundry.toml', 'contracts/remappings.txt', 'contracts/.submodule-state') }}-

      # The actual hard gate. Identical invocation to what
      # `deploy-mainnet.sh` runs at preflight step [1b], so CI agreement
      # with the mainnet runbook is preserved at the boundary that
      # matters.
      - name: Pre-deploy check (full regression)
        run: bash script/predeploy-check.sh --full

      # On v* tags, also print the resolved compiler version + facet
      # bytecode sizes for audit-trail capture in the workflow run log.
      # No code change, just observable evidence the build that gated
      # the release matched the configured solc + size budget.
      - name: Audit trail — solc + facet sizes
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          forge --version
          echo
          echo "Facet runtime bytecode sizes (EIP-170 ceiling = 24576 bytes):"
          forge build --sizes 2>&1 | grep -E '^[ │]+[A-Z][a-zA-Z0-9]+(Facet|Library|Diamond)\b' || true
