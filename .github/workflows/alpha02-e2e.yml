# alpha02 fork-tier e2e — the standard automatic regression for the
# retail app (docs/TestScopes/Alpha02RegressionFlows.md). Runs the
# real built app against `anvil --fork-url <base-sepolia>` (the
# DEPLOYED Diamond's live bytecode + state, disposable and
# time-travelable) with a fork-hydrated indexer stub and ephemeral
# per-run wallets — no secrets required.
#
# Trigger scope (deliberate): the suite exercises the APP against the
# DEPLOYED chain, so it cares about apps/alpha02/**, the shared
# workspace code the app imports (packages/lib/** — curated assets,
# error decoding), and the consumed artifacts in packages/contracts/**
# (ABIs + deployments — where a contract change actually reaches the
# app, per the repo's sync convention). Raw contracts/** changes don't
# alter the fork until they're deployed + synced, so they don't
# trigger it. The nightly schedule catches the other direction: the
# live testnet moving under an unchanged app.
name: alpha02 e2e (anvil fork)

on:
  pull_request:
    paths:
      - 'apps/alpha02/**'
      - 'packages/contracts/**'
      - 'packages/lib/**'
      - '.github/workflows/alpha02-e2e.yml'
  push:
    branches: [main]
    paths:
      - 'apps/alpha02/**'
      - 'packages/contracts/**'
      - 'packages/lib/**'
      - '.github/workflows/alpha02-e2e.yml'
  schedule:
    - cron: '17 3 * * *' # nightly: catch live-testnet drift under an unchanged app
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: alpha02-e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: fork-tier scenarios
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Foundry (anvil)
        uses: foundry-rs/foundry-toolchain@b00af27efadbc7b4ca8b82abbd903b17cc874d2a # v1

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: pnpm

      - name: Install workspace deps
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: pnpm --filter @vaipakam/alpha02 exec playwright install --with-deps chromium

      - name: Typecheck the e2e surface
        run: pnpm --filter @vaipakam/alpha02 run e2e:typecheck

      - name: Run fork-tier e2e
        env:
          # Falls back to the public endpoint when the secret is unset —
          # set BASE_SEPOLIA_RPC_URL in repo secrets for a keyed fork
          # source if the public one throttles the fork's lazy reads.
          ALPHA02_E2E_FORK_URL: ${{ secrets.BASE_SEPOLIA_RPC_URL || 'https://sepolia.base.org' }}
        run: pnpm --filter @vaipakam/alpha02 run e2e

      - name: Upload traces on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: alpha02-e2e-traces
          path: apps/alpha02/test-results/
          retention-days: 7
      # Inline failure context: the page snapshot Playwright writes per
      # failure, printed straight into the job log so a diagnosis never
      # requires downloading the trace artifact (added while debugging
      # the #1082 08-spec failure from an environment that can't fetch
      # artifacts).
      - name: Print failure context
        if: failure()
        run: |
          for f in apps/alpha02/test-results/*/error-context.md; do
            [ -f "$f" ] || continue
            echo "===== $f ====="
            cat "$f"
          done
