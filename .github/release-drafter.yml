# release-drafter config — auto-drafts GitHub Releases from merged PRs.
# https://github.com/release-drafter/release-drafter
#
# What this does:
# - Watches PRs merged to `main`. On each merge, updates a SINGLE
#   draft release with the merged PR appended under its category.
# - Categories are driven by PR labels (the same set the Project
#   board uses, per .github/LABELS.md).
# - Suggests the next semver based on label-driven version-bump
#   rules below — `breaking` → major, `feature`/`enhancement` →
#   minor, `fix`/`bug`/`security`/`infra`/`chore`/`refactor`/
#   `perf`/`documentation` → patch.
# - DOES NOT publish silently. The draft sits in the Releases tab
#   until the maintainer reviews the body + edits the tag + clicks
#   "Publish release". This is the deliberate gate — auto-drafting
#   != auto-publishing.
#
# Tagging cadence (per ProjectProcedures.md §6.x):
# - End-of-iteration patch tags (every 7 days on Monday, optional).
# - Named release tags at named milestone close (audit-prep,
#   mainnet-cutover, etc.).
# - Mainnet artefact tags are gated by `mainnet-gate.yml` regardless
#   — release-drafter just helps with the body content.

name-template: 'v$RESOLVED_VERSION'
tag-template: 'v$RESOLVED_VERSION'

categories:
  - title: '🚨 Breaking changes'
    labels:
      - 'breaking'
      - 'breaking-change'
  - title: '✨ Features'
    labels:
      - 'enhancement'
      - 'feature'
  - title: '🐛 Bug fixes'
    labels:
      - 'bug'
      - 'fix'
  - title: '🔒 Security'
    labels:
      - 'security'
  - title: '🛠 Infrastructure / CI'
    labels:
      - 'infra'
      - 'perf'
      - 'refactor'
  - title: '📦 Audit / mainnet rollout'
    labels:
      - 'audit'
      - 'testnet-rehearsal'
      - 'mainnet-rollout'
  - title: '📚 Documentation'
    labels:
      - 'documentation'
  - title: '🧹 Chores'
    labels:
      - 'chore'
  - title: '⬆️ Dependencies'
    labels:
      - 'dependencies'

# Anything tagged `release-notes-skip` doesn't surface in the
# drafted body (rare — most things should appear somewhere).
exclude-labels:
  - 'release-notes-skip'
  - 'duplicate'
  - 'wontfix'
  - 'invalid'
  - 'question'

# Label-driven semver bump suggestion.
# `breaking` → major; `feature`/`enhancement` → minor; everything
# else → patch. The maintainer can override the resolved version
# in the draft UI before publishing.
version-resolver:
  major:
    labels:
      - 'breaking'
      - 'breaking-change'
  minor:
    labels:
      - 'enhancement'
      - 'feature'
  patch:
    labels:
      - 'bug'
      - 'fix'
      - 'security'
      - 'infra'
      - 'perf'
      - 'refactor'
      - 'chore'
      - 'documentation'
      - 'audit'
      - 'dependencies'
      - 'testnet-rehearsal'
      - 'mainnet-rollout'
  default: patch

# `$CHANGES` is the auto-rendered category list of merged PRs.
template: |
  ## Vaipakam $RESOLVED_VERSION

  $CHANGES

  ---

  **Pinned commit:** `$RESOLVED_VERSION` → check this release's tag
  for the exact SHA the artefacts were built from.

  For the **functional narrative** (plain-English description of
  what changed and why), read the matching dated file under
  [`docs/ReleaseNotes/`](https://github.com/vaipakam/vaipakam/tree/main/docs/ReleaseNotes).
  This auto-drafted body is the PR-level changelog; the dated
  narrative is the human-curated companion.

  **Auditors + ecosystem integrators**: see the
  [`release.yml`](https://github.com/vaipakam/vaipakam/blob/main/.github/workflows/release.yml)
  workflow — it auto-attaches per-chain `addresses-<slug>.json` +
  consolidated `deployments.json` + `abis.tar.gz` to every `v*` tag
  push so this release becomes programmatically pinnable.

# Cosmetics — PRs are listed with author + number, grouped by
# the categories above.
change-template: '- $TITLE @$AUTHOR (#$NUMBER)'
change-title-escapes: '\<*_&'   # escape Markdown that PR titles sometimes carry

# No-PR-this-cycle message — keeps the draft tidy if a release
# window closes with no qualifying PRs.
no-changes-template: '- _No user-facing changes — internal maintenance only._'
