# Tenderly Alert Presets — Vaipakam Cross-Chain (CCIP) Stack
#
# Companion file to `alerts.yaml`. The main file covers protocol-side
# events on the Diamond + Timelock; this one covers the CCIP cross-chain
# surface under `contracts/src/crosschain/` (post-T-068, May 2026).
#
# REPLACES the legacy `ops/lz-watcher` Cloudflare Worker. That Worker
# monitored the LayerZero V2 stack which was decommissioned in T-068
# (PR #46, merged 2026-05-18). The 1,261-LOC self-hosted Worker is being
# retired in favour of Tenderly presets that exercise the same alert
# routing + severity model the rest of the protocol's monitoring uses.
# See issue #250 for the replacement decision rationale.
#
# Per-chain scoping: Tenderly alerts are scoped per contract address.
# Apply the same way as the main alerts.yaml — envsubst + tenderly CLI:
#
#   export CHAIN=base
#   export CHAIN_ID=8453
#   export CCIP_MESSENGER_ADDRESS=0x...
#   export VPFI_POOL_RATE_GOVERNOR_ADDRESS=0x...
#   export VAIPAKAM_REWARD_MESSENGER_ADDRESS=0x...
#   export VPFI_BUY_RECEIVER_ADDRESS=0x...     # Base only
#   export VPFI_TOKEN_ADDRESS=0x...            # Base only (for the
#                                              # LockReleaseTokenPool
#                                              # invariant; see below)
#   # — OR on a mirror chain —
#   export VPFI_MIRROR_TOKEN_ADDRESS=0x...    # mirror chains only
#   export VPFI_BUY_ADAPTER_ADDRESS=0x...     # mirror chains only
#
#   envsubst < alerts-crosschain.yaml > alerts-crosschain.${CHAIN}.yaml
#   tenderly alerts apply --file alerts-crosschain.${CHAIN}.yaml --project vaipakam
#
# Chain-role conditional sections:
#   §A + §B + §C apply to EVERY chain (CcipMessenger, VpfiPoolRateGovernor,
#                                       VaipakamRewardMessenger).
#   §D + §E apply ONLY to mirror chains (VPFIMirrorToken, VpfiBuyAdapter).
#   §F applies ONLY to canonical Base (VpfiBuyReceiver).
#
# An unset envsubst variable becomes an empty string and Tenderly will
# reject the resulting alert. Use the operator's deploy artifacts
# (contracts/deployments/<chain-slug>/addresses.json) as the source of
# truth for the per-chain values.
#
# Severity tiers + routing match alerts.yaml conventions:
#   P0  immediate page (pager) — pause tripped or security-critical drift
#   P1  page during business hours — config change or stuck-state signal
#   P2  slack-only — trend / cluster signal
#
# A new routing destination `slack-crosschain` is introduced for security-
# critical cross-chain events. If your Tenderly project doesn't already
# have it wired, fall back to `slack-incidents`.

version: 1
project: vaipakam

# ═══════════════════════════════════════════════════════════════════════
# §A. CcipMessenger — every chain
# ═══════════════════════════════════════════════════════════════════════
#
# The single CCIP adapter port that every domain contract talks to.
# Pause = the cross-chain layer is offline. Config drift = unauthorized
# governance / compromised admin key.

- id: ccip-messenger-paused
  severity: P0
  description: >
    GuardianPausable.Paused emitted on the CcipMessenger. All cross-chain
    sends from this chain (VPFI buy, reward report/broadcast) revert
    until unpause. If the pause was intentional incident response,
    open the runbook. If not, suspect a guardian-key compromise.
  type: event_emitted
  contract: ${CCIP_MESSENGER_ADDRESS}
  event: Paused(address)
  destination:
    - pagerduty
    - slack-incidents

- id: ccip-messenger-unpaused
  severity: P1
  description: >
    GuardianPausable.Unpaused on the CcipMessenger. Resumption of
    cross-chain traffic. Cross-reference with the incident timeline;
    unpause should always trail an explicit "all clear" decision.
  type: event_emitted
  contract: ${CCIP_MESSENGER_ADDRESS}
  event: Unpaused(address)
  destination:
    - slack-incidents

- id: ccip-messenger-chain-selector-changed
  severity: P1
  description: >
    CcipMessenger.ChainSelectorSet — the chainId → CCIP-selector map
    for a destination chain changed. Should only fire during initial
    wire-up or a CCIP-side selector migration (rare). A subsequent fire
    in steady state = unauthorized config edit; suspect admin-key
    compromise. Sanity check against the design doc §10 chain set.
  type: event_emitted
  contract: ${CCIP_MESSENGER_ADDRESS}
  event: ChainSelectorSet(uint256,uint64)
  destination:
    - pagerduty
    - slack-crosschain

- id: ccip-messenger-remote-changed
  severity: P0
  description: >
    CcipMessenger.RemoteMessengerSet — the address we trust as the peer
    CcipMessenger on a destination chain changed. Critical: this is the
    cross-chain trust root. An attacker who can flip this can intercept
    every cross-chain message we send. Compare immediately against the
    deployment artifacts; if it doesn't match, treat as active
    compromise.
  type: event_emitted
  contract: ${CCIP_MESSENGER_ADDRESS}
  event: RemoteMessengerSet(uint256,address)
  destination:
    - pagerduty
    - slack-incidents
    - slack-crosschain

- id: ccip-messenger-channel-peer-changed
  severity: P0
  description: >
    CcipMessenger.ChannelPeerSet — channel routing peer (vpfi-buy or
    vpfi-reward) updated for a destination chain. Same trust-root class
    as RemoteMessengerSet but at finer granularity (per-channel). A
    rogue ChannelPeerSet can redirect channel-scoped messages
    (e.g. buy delivery) to an attacker-controlled receiver while
    leaving the messenger trust root intact. Treat as P0.
  type: event_emitted
  contract: ${CCIP_MESSENGER_ADDRESS}
  event: ChannelPeerSet(bytes32,uint256,address)
  destination:
    - pagerduty
    - slack-incidents
    - slack-crosschain

- id: ccip-messenger-channel-registered
  severity: P2
  description: >
    CcipMessenger.ChannelRegistered — a NEW channel was registered on
    this chain. Today's channel set is { vpfi-buy, vpfi-reward }.
    A new channel = either an intentional protocol extension or
    unauthorized registration; sanity-check against the planned
    channel inventory.
  type: event_emitted
  contract: ${CCIP_MESSENGER_ADDRESS}
  event: ChannelRegistered(bytes32,address)
  destination:
    - slack-crosschain

# ═══════════════════════════════════════════════════════════════════════
# §B. VpfiPoolRateGovernor — every chain
# ═══════════════════════════════════════════════════════════════════════
#
# Bounds-checked rate-limit admin for the VPFI TokenPool on each chain.
# Drift here changes the blast-radius of any cross-chain VPFI flow exploit.

- id: vpfi-pool-rate-governor-paused
  severity: P0
  description: >
    GuardianPausable.Paused on VpfiPoolRateGovernor. Pool rate-limit
    edits are blocked until unpause — the LIVE per-lane caps stay at
    their pre-pause values. If the pause is intentional (e.g. governance
    is staging a coordinated cap change), expect a subsequent batch
    LaneRateLimitsSet immediately after Unpaused.
  type: event_emitted
  contract: ${VPFI_POOL_RATE_GOVERNOR_ADDRESS}
  event: Paused(address)
  destination:
    - pagerduty
    - slack-incidents

- id: vpfi-pool-rate-governor-rate-limits-changed
  severity: P1
  description: >
    VpfiPoolRateGovernor.LaneRateLimitsSet — per-lane capacity / refill
    rate updated. Starting values are 50,000 VPFI capacity / ≈5.8 VPFI/s
    per the design doc §10. A change is either a governance-approved
    cap bump (sanity check against the change log) or an unauthorized
    edit. ET-008 bounds reject extreme values at the contract level,
    so a successful emit means the new values are within sanity range,
    but still worth reviewing.
  type: event_emitted
  contract: ${VPFI_POOL_RATE_GOVERNOR_ADDRESS}
  event: LaneRateLimitsSet(uint64,uint128,uint128,uint128,uint128)
  destination:
    - slack-crosschain

- id: vpfi-pool-rate-governor-pool-changed
  severity: P0
  description: >
    VpfiPoolRateGovernor.PoolSet — the TokenPool address this governor
    manages changed. The TokenPool is the actual contract holding /
    minting the cross-chain VPFI on this chain. Flipping it points the
    rate-limit admin at a different pool; an attacker who flips this
    can apply manipulated rate limits to a rogue pool while leaving the
    original pool unbounded. Critical.
  type: event_emitted
  contract: ${VPFI_POOL_RATE_GOVERNOR_ADDRESS}
  event: PoolSet(address,address)
  destination:
    - pagerduty
    - slack-incidents
    - slack-crosschain

# ═══════════════════════════════════════════════════════════════════════
# §C. VaipakamRewardMessenger — every chain
# ═══════════════════════════════════════════════════════════════════════
#
# Reward REPORT (mirror → Base) + BROADCAST (Base → every mirror) of the
# global per-day interest pool. Config drift here changes who can submit
# reports and where broadcasts land.

- id: reward-messenger-paused
  severity: P0
  description: >
    GuardianPausable.Paused on VaipakamRewardMessenger. Per-day reward
    finalization will stall — claim()-side will revert with
    "denominator not yet broadcast" until unpause.
  type: event_emitted
  contract: ${VAIPAKAM_REWARD_MESSENGER_ADDRESS}
  event: Paused(address)
  destination:
    - pagerduty
    - slack-incidents

- id: reward-messenger-config-changed
  severity: P1
  description: >
    VaipakamRewardMessenger.MessengerSet — the CcipMessenger reference
    on the reward messenger changed. Should only fire during deploy /
    coordinated upgrade. A subsequent fire = unauthorized rewiring of
    the reward path through a potentially-rogue messenger.
  type: event_emitted
  contract: ${VAIPAKAM_REWARD_MESSENGER_ADDRESS}
  event: MessengerSet(address,address)
  destination:
    - pagerduty
    - slack-crosschain

- id: reward-messenger-diamond-changed
  severity: P0
  description: >
    VaipakamRewardMessenger.DiamondSet — the Diamond reference (which
    receives reward reports + broadcasts) changed. An attacker who can
    flip this can redirect reward accounting to a fake Diamond. Critical.
  type: event_emitted
  contract: ${VAIPAKAM_REWARD_MESSENGER_ADDRESS}
  event: DiamondSet(address,address)
  destination:
    - pagerduty
    - slack-incidents
    - slack-crosschain

- id: reward-messenger-broadcast-destinations-changed
  severity: P1
  description: >
    VaipakamRewardMessenger.BroadcastDestinationsSet — the list of
    mirror chain ids that receive daily reward broadcasts changed.
    Expected on chain-set expansion or contraction; unauthorized
    change = potential broadcast suppression for a mirror chain (its
    `knownGlobalInterest` would never update, blocking claims there).
  type: event_emitted
  contract: ${VAIPAKAM_REWARD_MESSENGER_ADDRESS}
  event: BroadcastDestinationsSet(uint256[])
  destination:
    - slack-crosschain

# ═══════════════════════════════════════════════════════════════════════
# §D. VPFIMirrorToken — MIRROR CHAINS ONLY
# ═══════════════════════════════════════════════════════════════════════
#
# Skip §D on Base. The canonical chain uses VPFIToken + LockReleaseTokenPool
# (which doesn't fire a TokenPoolUpdated equivalent — the pool is set at
# CCT registry time and is immutable post-registration).

- id: vpfi-mirror-token-paused
  severity: P0
  description: >
    GuardianPausable.Paused on VPFIMirrorToken (mirror chain).
    Cross-chain VPFI mint/burn is blocked — incoming CCIP messages
    that would mint VPFI on this chain will fail at the BurnMintPool's
    call to VPFIMirrorToken.mint(); they're parked in CCIP's failed-
    message register for manual re-execution post-unpause.
  type: event_emitted
  contract: ${VPFI_MIRROR_TOKEN_ADDRESS}
  event: Paused(address)
  destination:
    - pagerduty
    - slack-incidents

- id: vpfi-mirror-token-pool-updated
  severity: P0
  description: >
    VPFIMirrorToken.TokenPoolUpdated — the BurnMintTokenPool address
    this mirror trusts to call mint()/burn() changed. The pool is the
    CCIP-registry-managed bridge; a rogue change here means an
    attacker-controlled pool can mint VPFI on this mirror without
    the corresponding lock on Base. Critical — direct path to
    arbitrary mirror VPFI inflation.
  type: event_emitted
  contract: ${VPFI_MIRROR_TOKEN_ADDRESS}
  event: TokenPoolUpdated(address,address)
  destination:
    - pagerduty
    - slack-incidents
    - slack-crosschain

# ═══════════════════════════════════════════════════════════════════════
# §E. VpfiBuyAdapter — MIRROR CHAINS ONLY
# ═══════════════════════════════════════════════════════════════════════
#
# Skip §E on Base. The canonical chain uses VpfiBuyReceiver (§F) instead.

- id: vpfi-buy-adapter-paused
  severity: P0
  description: >
    GuardianPausable.Paused on VpfiBuyAdapter (mirror chain).
    Cross-chain VPFI buys originated from this chain will revert.
    Existing pending buys (BuyRequested but not yet resolved on Base)
    can be reclaimed via `reclaimTimedOutBuy` post-refund-timeout.
  type: event_emitted
  contract: ${VPFI_BUY_ADAPTER_ADDRESS}
  event: Paused(address)
  destination:
    - pagerduty
    - slack-incidents

- id: vpfi-buy-adapter-rate-limits-changed
  severity: P1
  description: >
    VpfiBuyAdapter.RateLimitsSet — per-request cap or rolling 24h cap
    changed on the adapter. Defence-in-depth ABOVE the per-lane CCIP
    TokenPool limits managed by VpfiPoolRateGovernor; tightening these
    is conservative, loosening them widens blast radius on a forged-
    delivery scenario. Compare new values against the design doc §10
    starting values + the operator change calendar.
  type: event_emitted
  contract: ${VPFI_BUY_ADAPTER_ADDRESS}
  event: RateLimitsSet(uint256,uint256)
  destination:
    - slack-crosschain

- id: vpfi-buy-adapter-payment-token-changed
  severity: P0
  description: >
    VpfiBuyAdapter.PaymentTokenSet — the ERC20 the adapter pulls from
    buyers (or address(0) for native gas) changed. On BNB Chain + Polygon
    PoS mainnet the wrong setting causes every buy to misprice (per the
    "VpfiBuyAdapter payment-token mode by chain" section in CLAUDE.md).
    The init-time `_assertPaymentTokenSane` guard catches obvious cases
    (non-contract addresses, non-18-dec tokens) but doesn't enforce the
    chain → mode policy at the contract level — that's operator-side.
  type: event_emitted
  contract: ${VPFI_BUY_ADAPTER_ADDRESS}
  event: PaymentTokenSet(address,address)
  destination:
    - pagerduty
    - slack-incidents
    - slack-crosschain

- id: vpfi-buy-adapter-treasury-changed
  severity: P0
  description: >
    VpfiBuyAdapter.TreasurySet — the address that receives refunded /
    settled buy-flow funds changed. An attacker who can flip this can
    siphon both refund and settlement flows. Sanity check against the
    governance multisig address.
  type: event_emitted
  contract: ${VPFI_BUY_ADAPTER_ADDRESS}
  event: TreasurySet(address,address)
  destination:
    - pagerduty
    - slack-incidents
    - slack-crosschain

# ═══════════════════════════════════════════════════════════════════════
# §F. VpfiBuyReceiver — CANONICAL BASE ONLY
# ═══════════════════════════════════════════════════════════════════════
#
# Skip §F on mirror chains. Base hosts the buy-flow settlement; mirrors
# host the adapter (§E).

- id: vpfi-buy-receiver-paused
  severity: P0
  description: >
    GuardianPausable.Paused on VpfiBuyReceiver (Base). Incoming
    cross-chain BUY_REQUEST messages from mirror adapters will revert
    here; they're parked in CCIP's failed-message register for manual
    re-execution post-unpause. Buyers on mirror chains see "buy stuck"
    until either unpause + manual re-execute OR refund-timeout.
  type: event_emitted
  contract: ${VPFI_BUY_RECEIVER_ADDRESS}
  event: Paused(address)
  destination:
    - pagerduty
    - slack-incidents

- id: vpfi-buy-receiver-messenger-changed
  severity: P0
  description: >
    VpfiBuyReceiver.MessengerSet — the CcipMessenger reference (which
    delivers BUY_REQUEST messages) changed. Same trust-root class as
    the messenger-side config drift; rogue messenger can deliver forged
    buys.
  type: event_emitted
  contract: ${VPFI_BUY_RECEIVER_ADDRESS}
  event: MessengerSet(address,address)
  destination:
    - pagerduty
    - slack-incidents
    - slack-crosschain

- id: vpfi-buy-receiver-stuck-vpfi
  severity: P1
  description: >
    Scheduled action: count VpfiBuyReceiver.VPFIStuckForRetry events in
    the trailing 1h window. >= 3 within 1h on a Base deploy is an
    anomaly — investigate the upstream adapter chain (likely a buyer
    address mismatch, a Diamond-side rejection, or a downstream contract
    bug). Each stuck VPFI is recoverable via the two-step retry path,
    but a cluster suggests something systematically wrong.
  type: web3_action
  schedule: "0 * * * *" # hourly
  action: lib/count-stuck-vpfi.ts
  params:
    receiver: ${VPFI_BUY_RECEIVER_ADDRESS}
    chain_id: ${CHAIN_ID}
    threshold: 3
  destination:
    - slack-crosschain

# ═══════════════════════════════════════════════════════════════════════
# §G. Ownership drift — every cross-chain contract, every chain
# ═══════════════════════════════════════════════════════════════════════
#
# Common-shape catch-all for OwnershipTransferred on any cross-chain
# contract. Should only fire during the post-deploy handover to the
# governance multisig → timelock (per CLAUDE.md Cross-Chain Security
# Policy). Steady-state fires = potential ownership-takeover attempt.
#
# Per-contract alerts because Tenderly scopes by address. Operator
# applies all six (or the four relevant on a mirror, three on Base).

- id: ccip-messenger-owner-changed
  severity: P0
  description: >
    Ownership of CcipMessenger transferred. Should NEVER fire post
    mainnet-handover. Investigate immediately.
  type: event_emitted
  contract: ${CCIP_MESSENGER_ADDRESS}
  event: OwnershipTransferred(address,address)
  destination:
    - pagerduty
    - slack-incidents
    - slack-crosschain

- id: vpfi-pool-rate-governor-owner-changed
  severity: P0
  description: >
    Ownership of VpfiPoolRateGovernor transferred. Should NEVER fire
    post mainnet-handover. Investigate immediately.
  type: event_emitted
  contract: ${VPFI_POOL_RATE_GOVERNOR_ADDRESS}
  event: OwnershipTransferred(address,address)
  destination:
    - pagerduty
    - slack-incidents
    - slack-crosschain

- id: reward-messenger-owner-changed
  severity: P0
  description: >
    Ownership of VaipakamRewardMessenger transferred. Should NEVER
    fire post mainnet-handover. Investigate immediately.
  type: event_emitted
  contract: ${VAIPAKAM_REWARD_MESSENGER_ADDRESS}
  event: OwnershipTransferred(address,address)
  destination:
    - pagerduty
    - slack-incidents
    - slack-crosschain

- id: vpfi-mirror-token-owner-changed
  severity: P0
  description: >
    Ownership of VPFIMirrorToken (mirror chain) transferred. Should
    NEVER fire post mainnet-handover. Investigate immediately.
  type: event_emitted
  contract: ${VPFI_MIRROR_TOKEN_ADDRESS}
  event: OwnershipTransferred(address,address)
  destination:
    - pagerduty
    - slack-incidents
    - slack-crosschain

- id: vpfi-buy-adapter-owner-changed
  severity: P0
  description: >
    Ownership of VpfiBuyAdapter (mirror chain) transferred. Should
    NEVER fire post mainnet-handover. Investigate immediately.
  type: event_emitted
  contract: ${VPFI_BUY_ADAPTER_ADDRESS}
  event: OwnershipTransferred(address,address)
  destination:
    - pagerduty
    - slack-incidents
    - slack-crosschain

- id: vpfi-buy-receiver-owner-changed
  severity: P0
  description: >
    Ownership of VpfiBuyReceiver (Base) transferred. Should NEVER fire
    post mainnet-handover. Investigate immediately.
  type: event_emitted
  contract: ${VPFI_BUY_RECEIVER_ADDRESS}
  event: OwnershipTransferred(address,address)
  destination:
    - pagerduty
    - slack-incidents
    - slack-crosschain
